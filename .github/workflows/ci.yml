name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    services:
      postgres:
        # pgvector image bundles Postgres 16 + the `vector` extension that
        # migration 001_pgvector.sql needs for memory_embeddings ANN search.
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: Riverse
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Init database schema
        run: psql -f agent/schema.sql
        env:
          PGHOST: localhost
          PGUSER: postgres
          PGPASSWORD: postgres
          PGDATABASE: Riverse

      - name: Create settings.yaml for tests
        run: |
          cp settings.yaml.default settings.yaml
          sed -i '/^    host: "localhost"/a\    password: "postgres"' settings.yaml

      - name: Run migrations
        # schema.sql gives us the base tables; migrations/005-012 add the
        # owner_id columns + accounts/access_tokens/family_* tables that the
        # storage layer expects. Same sequence as docker/start.sh.
        run: python3 -c "from agent.storage.migrations import migrate; migrate()"

      - name: Test imports
        run: python tests/test_imports.py

      - name: Unit tests
        run: |
          python tests/test_parsing.py
          python tests/test_maturity.py
          python tests/test_synonyms.py
          python tests/test_profile_filter.py
          python tests/test_perceive.py
          python tests/test_trajectory.py
          python tests/test_think.py
          python tests/test_disputes.py
          python tests/test_formatting.py
          python tests/test_session_memory.py

      - name: Storage tests
        run: python tests/test_storage.py
