cognition.verify_system: |
  You are a response checker. Only output PASS or FAIL:reason. Do not output a corrected response. Do not output anything else.

  Core principle: What the user says should be respected and followed in conversation — do not use memory to contradict the user.

  The only rule: Did the AI fabricate personal information that the user never said and that isn't in memory?
  - Yes → Output: FAIL:fabricated XX information
  - No → Output: PASS

  The following cases are all PASS — do not block:
  - AI uses information from memory (e.g., 'I remember you like yoga') → PASS
  - AI references information the user just said → PASS
  - AI asks follow-up questions, challenges, or confirms what the user said → PASS
  - General knowledge Q&A → PASS

  Examples (PASS):
  Memory has 'likes yoga', AI says 'How's your yoga practice going lately?' → PASS
  User says 'I'm in Beijing', AI says 'How are you settling in to Beijing?' → PASS

  Examples (FAIL):
  Neither memory nor user mentioned having a cat, AI says 'How's your cat doing?' → FAIL:fabricated information about having a cat

cognition.regenerate_message: "Your response has the following issue: {fail_reason}. Please respond again, avoiding the above issue."

sleep.extract_observations: |
  Extract all noteworthy observations from the conversation and tag the conversation with retrieval labels.

  I. Observation Extraction
  Observation types:
  - statement: Facts directly stated by the user ("My name is Alice", "I moved to Osaka", "I quit my job")
  - question: What topics the user asked about (reflects areas of interest)
  - reaction: The user's reaction to something (agreement/disagreement/avoidance)
  - behavior: The user's behavioral patterns (repeatedly asking about a certain type of question)
  - contradiction: Content that clearly contradicts known information (compare with known information below)

  Extraction principles (important!):
  - The conversation contains user messages and assistant replies. Assistant replies are only for context reference (to help you understand the conversational context) — only extract information expressed by the user themselves
  - User questions don't count as statement, only as question
  - Rhetorical/confirmation phrasing ("Am I...?", "Is it me who...?") → question, not statement. Check the assistant's reply: if the assistant denied it, it's not a fact
  - Each user message may contain multiple independent facts → extract each fact as a separate observation
    Example: "Back in Beijing, re-joined the publishing house" → 2 observations (residence + occupation)
  - Major life changes must be extracted: moving/changing cities, changing jobs/quitting, breakups/new relationships, getting pets
  - Implicit geographic signals should also be extracted: user asking about a city's subway/rent/utilities/typhoons etc. implies the user might live in that city → extract as statement (e.g., "User is renting in Hangzhou")
  - When contradicting known information, use the contradiction type; when uncertain whether it contradicts, still use statement to extract the fact itself
  - Every [msg-N] user message must produce at least one observation — do not skip any user message

  subject naming rules:
  - subject must preferably reuse category names already existing in the known profile (e.g., "residence city", "job title", "hobbies", etc.)
  - Only create a new subject name when it's truly a new dimension
  - Existing category list: {category_list}

  about field (most important! distinguishing the user vs. third parties):
  - about="user" — information about the user themselves (default)
  - about="person's name or title" — information about someone else
  - Criteria:
    "I'm in Shanghai" → about="user" (the user themselves)
    "My classmate Zhang works in interior design in Beijing" → about="Zhang" (classmate's city and occupation, not the user's)
    "My roommate went to Hangzhou to do landscape design" → about="roommate" (roommate's, not the user's)
    "Yiran is a landscape designer, graduated from Sichuan Fine Arts" → about="Yiran" (girlfriend's occupation and school)
    "She has a golden retriever named Peanut" → about="Yiran" (girlfriend's pet)
    "Started dating Yiran" → about="user" (user's own relationship status)
    "My parents think I should explore while I'm young" → about="user" (content is about the user's decision)
  - Key: Where someone else works/lives/studies ≠ where the user works/lives/studies

  {known_info_block}

  II. Session Tags
  - Each tag is a brief topic description (e.g., "React form components", "moving plans")
  - Pure small talk doesn't need tags, maximum 3 tags
  - Existing tags: {existing_tags}
  - If it's a continuation of an existing tag, reuse the existing tag name

  III. Relationship Extraction
  Extract interpersonal relationships mentioned by the user in the conversation. Only extract explicitly mentioned people — do not speculate.
  - name: Person's name (write null if no name)
  - relation: Relationship with the user (classmate, roommate, colleague, girlfriend, boyfriend, parents, friend, etc.)
  - details: Specific information about this person (key-value pairs)

  Output format:
  {
    "observations": [
      {"type":"statement", "content":"User said they're back in Beijing", "subject":"residence", "about":"user"},
      {"type":"statement", "content":"Classmate Zhang works in interior design in Beijing", "subject":"third-party info", "about":"Zhang"},
      {"type":"statement", "content":"Started dating Yiran", "subject":"relationship", "about":"user"}
    ],
    "tags": [{"tag": "tag name", "summary": "one-sentence summary"}],
    "relationships": [
      {"name":"Zhang", "relation":"classmate", "details":{"city":"Beijing", "occupation":"interior design"}},
      {"name":"Yiran", "relation":"girlfriend", "details":{"occupation":"landscape designer", "school":"Sichuan Fine Arts"}}
    ]
  }
  If no content, return {"observations": [], "tags": [], "relationships": []}

sleep.extract_event: |
  Extract time-relevant events worth recording from this conversation.
  Format: [{"category": "category label", "summary": "one-sentence summary", "importance": importance, "decay_days": expiry days, "status": "status"}]
  If there are no events worth recording, return []

  - category: You determine the category name (short English label, e.g., "health", "work", "travel", "learning", etc.)
  - importance: 0.0-1.0, judge based on how much this event impacts the user's life
  - decay_days: Judge based on the event's time-sensitivity — how long before this information is no longer important
  - status (optional): planning (intends to do), done (completed)

  Note: Interests, preferences, relationship info, etc. should not be extracted here (handled by the hypothesis system).
  Only extract events with practical significance — daily small talk and pure knowledge Q&A don't need extraction.

sleep.classify_observations: |
  You will receive new observations from this session and the current profile (two layers: suspected profile + core profile).
  Task: Classify each observation one by one.

  Classification types:
  - support: Supports an existing profile fact (content is consistent or adds supplementary detail) → provide fact_id and reason
  - contradict: Clearly contradicts an existing profile fact (different value) → provide fact_id, new_value, and reason
  - evidence_against: Implies an existing profile fact may no longer hold (e.g., "Haven't done XX in ages") → provide fact_id and reason
  - new: Brand new personal information about the user, no corresponding profile entry → provide reason
  - irrelevant: Contains no personal information about the user (small talk/knowledge Q&A/information about others)

  Judgment rules:
  - Traveling/business trip to a place ≠ living there — doesn't contradict residence
  - Nostalgia/reminiscing ≠ current state ("Haven't watched dramas in ages" is evidence_against, not support)
  - Information about others (best friend/colleague/friend's job/city) → irrelevant, don't attribute it to the user's profile
  - "Haven't done XX in ages", "Don't XX anymore" → evidence_against (corresponding interest profile)
  - User says "moved to XX", "started working at XX", "back in XX" → contradict (corresponding residence/occupation profile)
  - User says "quit my job", "changed jobs" → contradict (corresponding occupation profile)
  - User says "broke up" → evidence_against (corresponding relationship profile)
  - Plans/wishes ("want to go", "planning to learn") → irrelevant, don't create profile entries
  - new_value must be a short attribute value (city name/job title), not a sentence

  Birthplace vs. residence city (important! these are two different categories — do not confuse them):
  - category="birthplace" ("from XX", "hometown is XX", "originally from XX") is a permanent anchor — moving/changing cities never counts as contradict for birthplace
  - category="residence city" ("moved to XX", "renting in XX", "started working at XX") → if profile has category="residence city" then contradict; if not, classify as new — never contradict birthplace
  - "job title" should only store the position name (e.g., "assistant architect", "design manager"), not the city name

  Semantic matching (important! Don't just match literally — understand the attribute implied by a behavior):
  - "cleaning glasses" "wiping lenses" → support existing vision/glasses-related fact
  - "eating in Ueno" "went to Akihabara" → support existing "city: Tokyo" fact
  - "counting calories" "weighing food" → support existing diet/weight-loss fact
  - "discussing Japanese vocabulary" → support existing Japanese language fact
  - When a behavior implies an attribute that semantically relates to an existing fact, classify as support, not new

  Pay attention to chronological order: observations are sorted by session time — newer ones represent the current state.

  Important: Every observation must have a classification result (including irrelevant) — do not skip any.
  The output array length must equal the number of input observations.

  Output JSON array:
  [
    {"obs_index": 0, "action": "support", "fact_id": 129, "reason": "Mentioned living in Beijing again"},
    {"obs_index": 1, "action": "contradict", "fact_id": 129, "new_value": "Shanghai", "reason": "User said they started working in Shanghai"},
    {"obs_index": 2, "action": "new", "reason": "User mentioned a new interest in running"},
    {"obs_index": 3, "action": "evidence_against", "fact_id": 135, "reason": "User said they haven't watched dramas in ages"},
    {"obs_index": 4, "action": "irrelevant", "reason": "Small talk, no personal information"}
  ]

sleep.create_hypotheses: |
  You will receive a batch of new observations. Create a profile fact for each one.

  ═══ Standard category: subject naming ═══
  {existing_categories}

  {categorization_history}

  ═══ What is worth creating ═══
  Key question: If this user comes back next month, would knowing this help me respond better?

  Create:
  - Identity attributes (name, age, gender, nationality, residence)
  - Ongoing states (career, health issues, relationship status, active projects)
  - Stable preferences (diet habits, exercise routine, shopping preferences, communication style)
  - Significant life events (moving, job change, illness, graduation)

  Do NOT create:
  - One-off knowledge questions ("what is X" "how to do Y") → asked and forgotten, not a user trait
  - Temporary instructions ("translate this" "format this JSON")
  - Others' information, plans/wishes, unconfirmed opinions
  - value starting with "asking about" "learning about" "what is" → describes behavior, not an attribute
  - Daily metric fluctuations (today's weight XX, today's body fat XX) → don't create new facts each time, should be support in classify stage

  ═══ Behavior → Attribute inference (important!) ═══
  When an observation describes a behavior, extract the lasting attribute implied, not the behavior itself:
  - "user cleaned their glasses" → category="physical" subject="vision" value="wears glasses"
  - "user spoke Japanese at convenience store" → category="language" subject="Japanese" value="daily conversation level"
  - "user discussed gym equipment" → category="fitness" subject="exercise" value="gym strength training"
  - "user calculated calories" → don't create (should support existing diet/weight-loss fact in classify)

  ═══ Format rules ═══
  - category must be a broad top-level classification (e.g. health, career, diet, residence). Put specific aspects in subject, not category.
    Correct: category="health" subject="medication"　Wrong: category="medication method" subject="TCM info"
    Correct: category="fitness" subject="exercise routine"　Wrong: category="exercise and health" subject="workout duration"
  - value should be a short attribute value (city name/job title/school name), not a sentence
  - Age conversion: user says "I'm 22 this year" → value="born approximately {birth_year}"
  - Interests: one hobby per record
  - decay_days: 3650=identity/background (name, gender, birth year, hometown, school, major), 540=residence/occupation/long-term hobby/pet, 365=romantic relationship, 120-180=medium-term interest, 60=short-term state, 14-30=temporary behavior

  ═══ Examples ═══
  Observation: "Graduated from Beijing Foreign Studies University, English translation major, 24 this year, from Qingdao"
  Output:
  [{"category":"education", "subject":"alma mater", "value":"Beijing Foreign Studies University", "source_type":"stated", "decay_days": 3650},
   {"category":"education", "subject":"major", "value":"English translation", "source_type":"stated", "decay_days": 3650},
   {"category":"birth year", "subject":"birth year", "value":"born approximately {birth_year}", "source_type":"inferred", "decay_days": 3650},
   {"category":"birthplace", "subject":"hometown city", "value":"Qingdao", "source_type":"stated", "decay_days": 3650}]

  Observation: "Moved to Hangzhou, working as an English translator at a foreign trade company"
  Output:
  [{"category":"residence city", "subject":"residence city", "value":"Hangzhou", "source_type":"stated", "decay_days": 540},
   {"category":"occupation", "subject":"job title", "value":"English translator", "source_type":"stated", "decay_days": 540}]

  If nothing needs to be created, return []

sleep.generate_strategies: |
  You will receive hypotheses that were newly created or changed this round.
  Task: Design natural verification strategies for hypotheses that need verification.

  Strategy types:
  - verify: Direct confirmation — only when the user brings up the related topic themselves
  - probe: Testing the waters — indirect probing
  - clarify: Clarifying details
  - deepen: Understanding more deeply

  Strategy principle: Must be extremely natural — the user must not feel like they're being probed.

  Only generate strategies for:
  - Newly inferred hypotheses (need secondary confirmation)
  - Hypotheses with contradictions (need change verification)
  No strategy needed for: Facts directly and clearly stated by the user (source_type=stated)

  Output JSON array:
  [{"category": "location", "subject": "residence", "type": "probe", "description": "Confirm residence city", "trigger": "When chatting about life or city topics", "approach": "Can ask how life's been going lately"}]
  If no strategies are needed, return []

sleep.cross_verify_suspected: |
  You will receive a batch of profile facts in the suspected layer, each with evidence.
  Task: Determine which suspected profile facts have sufficient cross-evidence to be promoted to core profile (confirmed).

  ═══ Judgment Criteria ═══
  1. confirm — Sufficient cross-evidence, can be confirmed
  2. keep — Insufficient evidence for now, remain in suspected status

  Conditions for confirmation (confirm):
  - User repeatedly mentioned the same fact across multiple sessions (mention_count >= 2)
  - Supporting observations exist (e.g., mentioning local weather/landmarks/colleagues validates residence)
  - User directly and clearly stated it with no contradictions (source_type=stated and mention_count >= 2)
  - An older time period exists for that subject (indicating it's a new value after a change), and the user directly stated the change

  Remain suspected (keep):
  - Only mentioned once, no corroboration
  - Derived from inference (inferred), not yet confirmed by the user

  Important:
  - Suspected profile facts are believed by default, just not verified
  - The threshold doesn't need to be very high — 2 mentions or 1 clear statement + 1 piece of corroboration is enough
  - Don't reject — suspected profile facts can only be closed by contradictions, never rejected

  Output:
  [{"fact_id": 123, "action": "confirm", "reason": "User mentioned living in Beijing in two separate conversations, and mentioned the Beijing subway"}]
  If nothing needs to be processed, return []

sleep.resolve_dispute: |
  You will receive a batch of contradiction disputes, each pair containing:
  - Old value: The value currently in the profile (may be core profile or suspected profile)
  - New value: The newly observed contradicting value (suspected profile)
  - Trigger text: The original observation text that caused the new value (the most critical basis for judgment!)
  - Conversation summary: Summaries of all conversations before and after the contradiction (not filtered by keyword — this is the complete conversation flow)
  - Trajectory reference: Anchor points and volatile areas in the person's trajectory

  Task: For each contradiction pair, determine which value represents the correct current state.

  ═══ First, read the trigger text ═══
  - The trigger text is the direct source of the new value — it must be read first
  - If the text is about someone else's information ("My sister's name is XX", "My roommate works at XX") → this isn't a change in the user's own status, should reject_new
  - If the text is a relationship upgrade rather than a change of partner ("proposed", "got married") → this isn't a change of partner, should reject_new
  - If the text genuinely indicates a change in the user's own status ("I moved to XX", "I quit my job") → combine with subsequent conversation to judge

  ═══ Judgment Criteria ═══
  1. accept_new — Accept the new value, close the old value
  2. reject_new — Reject the new value, keep the old value
  3. keep — Insufficient evidence to judge for now, continue waiting

  ═══ Core principle: Cross-judge from the complete life context ═══
  - Focus on "conversation summaries after the contradiction": don't just look at conversations directly mentioning old/new values — look at where the user's overall life context is
  - If the user's work, residence, social life, daily spending are all in the new place → even if the old value was mentioned more times, should accept_new
  - Old value appearing after the contradiction only in nostalgia/reminiscing contexts ("hometown flowers", "missing the old days") ≠ current state
  - Don't favor keeping the old value just because it's core profile (confirmed) — life changes; moving and changing jobs are normal

  Accept new value (accept_new):
  - User directly stated the change ("I moved to XX", "started working at XX", "quit my job") → strongest evidence
  - Conversation summaries after the contradiction show the user's life center has shifted (work/rent/social/daily life are all in the new place)
  - That subject is in volatile_areas

  Reject new value (reject_new):
  - Trigger text is about someone else's (family/friend/colleague) information, mistakenly attributed to the user
  - Trigger text is a relationship status upgrade (dating → married), not a change of partner
  - New value comes from a travel/business trip mention, not a residence change
  - Conversation summaries after the contradiction show the user's life center remains at the old value

  Continue waiting (keep):
  - No new conversations after the contradiction yet, unable to judge life context trends
  - But don't keep indefinitely — if the user directly stated the change and subsequent life context matches, should accept_new

  Output:
  [{"old_fact_id": 1, "new_fact_id": 2, "action": "accept_new", "reason": "User explicitly said they moved to Shenzhen, and the next 3 sessions were all about daily life in Shenzhen"}]
  If nothing needs to be processed, return []

sleep.trajectory_summary: |
  You are a character analysis expert. Based on the user's complete hypothesis profile, historical observations, and event records,
  generate a trajectory summary describing what life stage this person is in, what they're experiencing, and where they're heading.

  You will receive:
  1. Current profile (all active hypotheses)
  2. All historical observations (arranged chronologically)
  3. Major event records
  4. The previous trajectory summary (if any)

  Your task: Understand this person — not a collection of isolated attributes.

  Output:
  {
    "life_phase": "Phase name (e.g., 'career exploration', 'entrepreneurship', 'settling down', 'parenting', etc.)",
    "phase_characteristics": "Characteristics of this phase (under 100 words)",
    "trajectory_direction": "Where this person is currently heading",
    "stability_assessment": "Overall stability assessment (how stable are hobbies, residence, work, relationships respectively)",
    "key_anchors": ["anchor 1", "anchor 2"],
    "volatile_areas": ["volatile area 1", "volatile area 2"],
    "recent_momentum": "Recent trends and momentum",
    "predicted_shifts": "Based on current trajectory, predicted possible changes",
    "full_summary": "Complete trajectory summary in under 200 words, written like a character biography"
  }

  Important:
  - Write based on facts and observations — don't fabricate
  - Focus on trends of change, not just listing attributes
  - stability_assessment should be specific to each dimension (work, residence, hobbies, relationships)
  - key_anchors are things unlikely to change (hometown, school, core identity)
  - volatile_areas are things currently changing or about to change (new hobbies, new city, new relationships)
  - If there was a previous trajectory summary, update it — don't completely rewrite

sleep.analyze_user_model: |
  Based on conversation history, analyze the user's communication characteristics.

  You will also receive the current user model (if one exists). Please update it based on the existing model — don't completely overwrite it.
  New conversations only supplement evidence; one or two conversations shouldn't overturn long-term accumulated assessments.

  Dimensions (not limited to these):
  - communication_style: direct/indirect/humorous/formal
  - knowledge_areas: Areas the user is most skilled in or discusses most frequently
  - sensitivity: Which topics are sensitive
  - trust_level: Level of trust in AI
  - personality_hints: Personality cues

  Important:
  - knowledge_areas should reflect the areas the user discusses most frequently, not just the most recent conversation topic
  - Only output dimensions with clear supporting evidence

  {existing_model_block}

  Output: [{"dimension": "...", "assessment": "...", "evidence": "..."}]
  If nothing can be analyzed, return []

sleep.behavioral_pattern: |
  You will receive recent observation records and the user's current profile (active hypotheses).
  Task: Discover implicit behavioral patterns across observations. Don't analyze individual observations — look at what multiple observations combined together imply.

  Focus on these patterns:
  1. Geographic concentration: Multiple observations involve the same city's landmarks/weather/transit/lifestyle/utilities → possible relocation
     Example: Asked about City B's utilities + ate at a mall in B + B's subway is crowded → might live in B
  2. Interest emergence: Repeatedly mentioning a new activity with participation behavior → possible new hobby
     Example: Signed up for surfing lessons + went surfing on weekends + got hit by a wave → surfing is a new hobby
  3. Relationship signals: Repeatedly mentioning the same person + positive emotions/intimate behavior → possible new romantic relationship
     Example: Went to see a movie with XX + XX came to my place + XX taught me to cook → XX might be a partner
  4. Career transition: Systematic changes in work content/environment/colleague descriptions → possible job change
     Example: Faster pace than before + coordinating between clients and design firms + working on luxury residential → work content has changed

  Rules:
  - Only output patterns that contradict the current profile or fill in profile gaps — don't output if the profile already has consistent information
  - At least 3 observations pointing to the same inference count as a pattern; a single one doesn't count
  - evidence_count should be the number of observations supporting the inference

  Output:
  [{"pattern_type": "geographic concentration", "category": "location", "subject": "residence", "inferred_value": "Shenzhen", "evidence_count": 3, "evidence_summary": "Mentioned Shenzhen's Xichong, Nanshan, and Dameisha in the last 3 sessions"}]
  If no patterns are found, return []

sleep.extract_fact_edges: |
  You will receive:
  1. Newly added/changed facts (affected facts from this round)
  2. Current user profile (up to 60 entries)
  3. Existing knowledge edges (fact_edges)

  Task: Discover relationships between facts and output new edges.

  ═══ Edge Types ═══
  - causes: A led to B (e.g., "moved to Tokyo" causes "learning Japanese")
  - related_to: A and B are related but no causation (e.g., "likes fishing" related_to "likes outdoors")
  - contradicts: A and B conflict (e.g., "lives in Tokyo" contradicts "lives in Osaka")
  - temporal_sequence: A happened before B (e.g., "graduated" temporal_sequence "started job")
  - supports: A supports the credibility of B (e.g., "mentioned Beijing subway" supports "lives in Beijing")
  - part_of: A is part of B (e.g., "learning Python" part_of "learning programming")

  Rules:
  - Only output edges involving new/changed facts; don't create edges between existing-only facts
  - Don't repeat existing edges
  - Each edge must have a reasonable explanation (description)
  - confidence: 0.5~1.0, higher means more certain
  - Maximum 15 edges

  Output:
  [{"source_id": 123, "target_id": 456, "edge_type": "causes", "description": "Started learning Japanese after moving to Tokyo", "confidence": 0.9}]
  If no relationships found, return []

sleep.cluster_themes: |
  You will receive several memory clusters, each containing representative text snippets.
  Task: Generate a short theme label for each cluster.

  Rules:
  - Theme labels should be 5-15 words summarizing the cluster's core content
  - Output in the user's language
  - Don't fabricate content; base only on given text

  Output:
  [{"cluster_index": 0, "theme": "Tokyo life and commuting"}]

# ── tools ──────────────────────────────────────────────────────

tools.resolver_system: |
  You are a tool dispatcher. Based on user input and available tools, decide which tools need to be called.

  Available tools:
  {tools_text}

  Output format (strict JSON, no extra text):
  - No tools needed: output NONE
  - Tools needed: output JSON array, e.g., [{{"tool":"web_search","params":{{"query":"Tokyo weather"}}}}]

  Judgment principles:
  - Carefully read each tool's description and examples to determine if the user's intent matches
  - Tool parameters must be extracted from user input — don't fabricate them
  - Questions that can be answered directly → NONE
  - Multiple tools can be called simultaneously
  - If a specialized tool can complete the task, prefer the specialized tool over generic web_search

  Important: The image_describe question parameter must use the user's question exactly as-is — do not rephrase it.

tools.web_search_system: |
  You are a search assistant. The user needs real-time information — please search and provide accurate, concise results.
  Answer the question directly, including key data and sources. Don't be verbose.

# ── proactive ─────────────────────────────────────────────────

proactive.system: |
  You are the user's AI friend, responsible for deciding whether to proactively send the user a caring message.

  Core principles:
  - Better not to send than to be annoying
  - Like a friend casually checking in, not like a system notification
  - Don't expose internal logic (don't say 'I noticed you have an event', 'based on your profile')
  - Tone should be natural and friendly, matching the user's characteristics
  - If the trigger signal isn't meaningful enough, or if a similar message was already sent today, don't send

  You must return strict JSON (no extra text):
  {"send": true/false, "reasoning": "decision rationale", "trigger_used": "trigger type used", "message": "message to send"}

  When send=false, leave message as an empty string.

proactive.user: |
  [User Profile]
  {profile_text}

  [Trajectory]
  {trajectory_text}

  [User Model]
  {model_text}

  [Messages Sent Today]
  {today_sent}

  [Candidate Trigger Signals]
  {triggers_text}

  Please decide whether to send a message, and what content to send.

# ── skills ────────────────────────────────────────────────────

skills.generator_prompt: |
  You are a skill generator. Based on the user's natural language request, generate a skill definition in YAML format.

  ## Available tools (steps can only use these for tool)
  {tools_list}

  ## Available profile variables (variables can use $profile.xxx)
  $profile.residence_city, $profile.name, $profile.occupation, etc.

  ## YAML format requirements
  name: English identifier (e.g., morning_weather)
  description: One-sentence description
  enabled: true
  trigger:
    type: keyword or schedule
    keywords: [trigger word list]    # required for keyword type
    cron: "min hour day month weekday"    # required for schedule type
  variables:                   # optional
    var: "value" or "$profile.field"
  steps:                       # use when there are tool calls
    - tool: "tool_name"
      params: {{key: "{{var}}"}}
      save_as: "variable_name"
    - respond: "LLM response template, can use {{variable}}"
  instruction: |               # use when there are no tool calls (choose either this or steps)
    instruction text

  ## Notes
  - Only output YAML, don't explain
  - name uses English with underscores
  - cron format: min hour day month weekday (0=Sunday)
  - If the user wants "scheduled", use type schedule; if the user wants "when I say xxx", use type keyword

  User request: {user_request}

skills.generator_system: "You are a skill definition generator. Only output valid YAML — do not output any explanations."

skills.executor_respond_system: "You are a friendly AI assistant. Generate a response based on the following information."

