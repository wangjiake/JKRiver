      question: "Specific question about the image (optional, defaults to describing content)"
    examples: ["What is this image", "What flowers are in the picture", "Help me read this screenshot"]
    default_question: "Please describe the content of this image."
  voice_transcribe:
    description: "Convert voice/audio files to text"
    parameters:
      file_path: "Audio file path (supports mp3/wav/ogg/m4a etc.)"
    examples: ["Transcribe voice message", "Convert recording to text"]
  finance_query:
    description: "Query user credit card spending records (filter by month, merchant). Always returns all matching records and totals."
    parameters:
      year: "Year (optional)"
      month: "Month (optional)"
      merchant: "Merchant name keyword (optional)"
    examples: ["Latest credit card transaction", "February spending", "How much did I spend last month", "Amazon purchases"]
  health_query:
    description: "Query user health data: weight, body fat, daily steps/activity. Always returns all data from the last 90 days."
    parameters:
      data_type: "weight | fat | activity | all"
    examples: ["My recent weight", "Steps in the last 30 days", "Body fat trend"]
  file_read:
    description: "Read local text file content (supports .txt/.py/.yaml/.json/.md etc.)"
    parameters:
      path: "File path (absolute or relative)"
    examples: ["Read settings.yaml", "View README.md content", "Show me what's in src/main.py"]
  shell_exec:
    description: "Execute safe shell commands (read-only commands only, such as ls/grep/git status)"
    parameters:
      command: "Shell command to execute"
    examples: ["Run git status", "List files in current directory", "Run python --version"]

