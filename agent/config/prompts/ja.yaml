tools.manifests:
  web_search:
    description: "インターネットでリアルタイム情報、天気、ニュース、価格などを検索"
    parameters:
      query: "検索キーワード"
    examples: ["今日の東京の天気", "iPhone最新価格", "東京発大阪行きの航空券"]
  image_describe:
    description: "画像の内容を説明し、物体、シーン、テキストを認識"
    parameters:
      file_path: "画像ファイルパス"
      question: "画像についての具体的な質問（オプション、デフォルトで内容を説明）"
    examples: ["この画像は何ですか", "画像に何の花がありますか", "このスクリーンショットを見てください"]
    default_question: "この画像の内容を説明してください。"
  voice_transcribe:
    description: "音声/オーディオファイルをテキストに変換"
    parameters:
      file_path: "オーディオファイルパス（mp3/wav/ogg/m4a等対応）"
    examples: ["音声メッセージを文字起こし", "録音をテキストに変換"]
  finance_query:
    description: "ユーザーのクレジットカード消費記録を照会（月別、加盟店別フィルター対応）。常にすべての該当記録と合計金額を返却。"
    parameters:
      year: "年（オプション）"
      month: "月（オプション）"
      merchant: "加盟店名キーワード（オプション）"
    examples: ["最新のクレジットカード消費", "2月の消費状況", "先月いくら使った", "アマゾンの消費記録"]
  health_query:
    description: "ユーザーの健康データを照会：体重、体脂肪、日々の歩数/活動量。常に最近90日分の全データを返却。"
    parameters:
      data_type: "weight(体重) | fat(体脂肪) | activity(歩数/活動) | all(すべて)"
    examples: ["最近の体重はいくら", "最近30日の歩数", "体脂肪の変化傾向"]
  file_read:
    description: "ローカルテキストファイルの内容を読み取り（.txt/.py/.yaml/.json/.md等対応）"
    parameters:
      path: "ファイルパス（絶対パスまたは相対パス）"
    examples: ["settings.yamlを読んで", "README.mdの内容を確認", "src/main.pyに何が書いてあるか見て"]
  shell_exec:
    description: "安全なshellコマンドを実行（読み取り専用コマンドのみ、ls/grep/git status等）"
    parameters:
      command: "実行するshellコマンド"
    examples: ["git statusを実行", "現在のディレクトリのファイル一覧", "python --versionを実行"]

