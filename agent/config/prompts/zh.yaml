tools.manifests:
  web_search:
    description: "搜索互联网获取实时信息、天气、新闻、价格等"
    parameters:
      query: "搜索关键词"
    examples: ["今天东京天气", "iPhone最新价格", "北京飞日本机票"]
  image_describe:
    description: "描述图片内容，识别图片中的物体、场景、文字等"
    parameters:
      file_path: "图片文件路径"
      question: "关于图片的具体问题（可选，默认描述图片内容）"
    examples: ["这张图片是什么", "图片里有什么花", "帮我看看这张截图"]
    default_question: "请描述这张图片的内容。"
  voice_transcribe:
    description: "将语音/音频文件转为文字"
    parameters:
      file_path: "音频文件路径（支持 mp3/wav/ogg/m4a 等）"
    examples: ["转写语音消息", "将录音转为文字"]
  finance_query:
    description: "查询用户信用卡消费记录（支持按月份、商家筛选）。总是返回全部匹配记录和合计金额。"
    parameters:
      year: "年份（可选）"
      month: "月份（可选）"
      merchant: "商家名关键词（可选）"
    examples: ["最近一笔信用卡消费", "2月份消费情况", "上个月消费了多少", "亚马逊消费记录"]
  health_query:
    description: "查询用户健康数据：体重、体脂、每日步数/活动量。总是返回最近90天全部数据。"
    parameters:
      data_type: "weight(体重) | fat(体脂) | activity(步数/活动) | all(全部)"
    examples: ["我最近体重多少", "最近30天步数", "体脂变化趋势"]
  file_read:
    description: "读取本地文本文件内容（支持 .txt/.py/.yaml/.json/.md 等）"
    parameters:
      path: "文件路径（绝对路径或相对路径）"
    examples: ["读一下 settings.yaml", "查看 README.md 的内容", "帮我看看 src/main.py 里写了什么"]
  shell_exec:
    description: "执行安全的 shell 命令（仅限只读命令，如 ls/grep/git status 等）"
    parameters:
      command: "要执行的 shell 命令"
    examples: ["执行 git status", "查看当前目录文件列表", "运行 python --version"]

