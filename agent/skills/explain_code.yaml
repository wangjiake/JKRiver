name: explain_code
description: Automatically explain code line by line when the user sends a snippet
trigger:
  type: keyword
  keywords: ["explain code", "what does this code do", "walk me through this"]
instruction: |
  The user wants you to explain code. Please:
  1. Summarize the purpose in one sentence
  2. Explain the key logic line by line or block by block
  3. Point out potential improvements or issues
enabled: true

