name: weekly_summary
description: Send a friendly weekend greeting every Sunday evening
trigger:
  type: schedule
  cron: "0 20 * * 0"   # Every Sunday at 20:00
steps:
  - respond: |
      As the user's AI friend, write a short and warm weekend greeting.
      Ask how their week went and if they have any plans for next week.
      Keep it casual, like a friend chatting — 2-3 sentences is enough.
enabled: true

