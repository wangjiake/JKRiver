skills:

  - name: explain_code
    description: 用户发代码时自动提供逐行解释
    trigger:
      type: keyword
      keywords: ["解释代码", "explain code", "这段代码什么意思", "帮我看看这段代码"]
    instruction: |
      用户希望你解释代码。请：
      1. 先用一句话概括这段代码的功能
      2. 逐行或逐块解释关键逻辑
      3. 指出可能的改进点或潜在问题
    enabled: true

  - name: weekly_summary
    description: 每周日晚上发送温馨周末问候
    trigger:
      type: schedule
      cron: "0 20 * * 0"
    steps:
      - respond: |
          作为用户的AI朋友，写一条简短温馨的周末问候。
          问问用户这周过得怎么样，下周有什么计划。
          语气像朋友随口聊天，2-3句话即可。
    enabled: true
