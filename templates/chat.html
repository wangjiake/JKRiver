<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat — {{ db_name }}</title>
<link rel="icon" type="image/svg+xml" href="/img/favicon.svg">
<link rel="icon" type="image/x-icon" href="/img/favicon.ico" sizes="48x48">
<link rel="icon" type="image/png" href="/img/favicon-96x96.png" sizes="96x96">
<link rel="apple-touch-icon" sizes="180x180" href="/img/apple-touch-icon.png">
<style>
:root {
  --bg: #161e2c;
  --bg-card: #1a2234;
  --bg-card2: #182030;
  --bg-header-start: #1a2030;
  --bg-header-end: #1e2636;
  --bg-input: #141c28;
  --bg-hover: #1e2636;
  --bg-hover2: #1c2432;
  --bg-accent: #1e3252;
  --bg-accent2: #1a2a3e;
  --border: #28344a;
  --border-light: #1e2838;
  --border-accent: #2a4468;
  --text: #b8c8d8;
  --text-2: #a8b8cc;
  --text-muted: #6e7e94;
  --text-faint: #506070;
  --text-faint2: #3a4858;
  --accent: #58a6ff;
  --green: #3fb950;
  --yellow: #d29922;
  --red: #f85149;
  --purple: #bc8cff;
  --shadow: rgba(0,0,0,0.5);
  --glass-bg: rgba(24, 30, 42, 0.68);
  --glass-sidebar: rgba(20, 26, 36, 0.80);
  --glass-card: rgba(28, 34, 48, 0.92);
  --glass-input: rgba(18, 22, 34, 0.84);
  --glass-blur: blur(24px) saturate(200%);
  --card-border: rgba(140, 158, 195, 0.16);
  --card-shadow: 0 4px 24px rgba(0, 0, 0, 0.45), inset 0 1px 0 rgba(160, 180, 220, 0.07);
  --body-gradient: linear-gradient(160deg, #1a2030 0%, #1e2838 35%, #1a2830 65%, #1c2038 100%);
}
body.light {
  --bg: #ffffff;
  --bg-card: #f6f8fa;
  --bg-card2: #f0f3f6;
  --bg-header-start: #f6f8fa;
  --bg-header-end: #eaeef2;
  --bg-input: #ffffff;
  --bg-hover: #eaeef2;
  --bg-hover2: #e8ecf0;
  --bg-accent: #ddf4ff;
  --bg-accent2: #cae8ff;
  --border: #d0d7de;
  --border-light: #eaeef2;
  --border-accent: #54aeff;
  --text: #1f2328;
  --text-2: #24292f;
  --text-muted: #57606a;
  --text-faint: #8c959f;
  --text-faint2: #afb8c1;
  --accent: #0969da;
  --green: #1a7f37;
  --yellow: #9a6700;
  --red: #cf222e;
  --purple: #8250df;
  --shadow: rgba(0,0,0,0.15);
  --glass-bg: rgba(255, 255, 255, 0.55);
  --glass-sidebar: rgba(248, 250, 255, 0.60);
  --glass-card: rgba(255, 255, 255, 0.88);
  --glass-input: rgba(255, 255, 255, 0.85);
  --card-border: rgba(0, 0, 0, 0.10);
  --card-shadow: 0 4px 20px rgba(0, 0, 0, 0.14), 0 1px 4px rgba(0, 0, 0, 0.08);
  --body-gradient: linear-gradient(160deg, #dde8ff 0%, #ede6fa 35%, #ddf2ec 65%, #f5e6f5 100%);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html { height: 100%; }
body { font-family: -apple-system, "Segoe UI", "Microsoft YaHei", sans-serif; background: var(--body-gradient); color: var(--text); height: 100vh; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }

/* Header */
.header { background: var(--glass-bg); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur); padding: 14px 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
.header-left { display: flex; align-items: center; gap: 10px; }
.header h1 { font-size: 20px; font-weight: 600; color: var(--text); }
.header .subtitle { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
.header-right { display: flex; gap: 6px; align-items: center; }
.nav-link { background: transparent; border: 1px solid rgba(255,255,255,0.10); border-radius: 8px; color: rgba(255,255,255,0.48); font-size: 12px; text-decoration: none; transition: all 0.2s; backdrop-filter: blur(12px) saturate(180%); -webkit-backdrop-filter: blur(12px) saturate(180%); padding: 5px 12px; }
.nav-link:hover { background: rgba(255,255,255,0.07); border-color: rgba(255,255,255,0.18); color: rgba(255,255,255,0.72); }
.nav-link.active { background: rgba(88,166,255,0.13); border-color: rgba(88,166,255,0.35); color: #58a6ff; }
.icon-btn { width: 30px; height: 30px; background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12); border-radius: 6px; color: var(--text-muted); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 15px; flex-shrink: 0; transition: all 0.15s; }
.icon-btn:hover { background: rgba(255,255,255,0.13); color: var(--text-2); border-color: rgba(255,255,255,0.22); }
.icon-btn.active { background: rgba(88,166,255,0.18); border-color: rgba(88,166,255,0.45); color: var(--accent); }
.lang-switch { display: flex; gap: 4px; }
.lang-btn { padding: 4px 10px; background: transparent; border: 1px solid rgba(255,255,255,0.10); border-radius: 8px; color: rgba(255,255,255,0.48); cursor: pointer; font-size: 12px; transition: all 0.2s; backdrop-filter: blur(12px) saturate(180%); -webkit-backdrop-filter: blur(12px) saturate(180%); }
.lang-btn:hover { background: rgba(255,255,255,0.07); border-color: rgba(255,255,255,0.18); color: rgba(255,255,255,0.72); }
.lang-btn.active { background: rgba(88,166,255,0.13); border-color: rgba(88,166,255,0.35); color: #58a6ff; }
.theme-btn { padding: 5px 8px; background: transparent; border: 1px solid rgba(255,255,255,0.10); border-radius: 8px; color: rgba(255,255,255,0.48); cursor: pointer; line-height: 1; display: flex; align-items: center; transition: all 0.2s; backdrop-filter: blur(12px) saturate(180%); -webkit-backdrop-filter: blur(12px) saturate(180%); }
.theme-btn:hover { background: rgba(255,255,255,0.07); border-color: rgba(255,255,255,0.18); color: rgba(255,255,255,0.72); }
body.light .nav-link { background: transparent; border-color: rgba(0,0,0,0.12); color: rgba(0,0,0,0.42); }
body.light .nav-link:hover { background: rgba(0,0,0,0.05); border-color: rgba(0,0,0,0.18); color: rgba(0,0,0,0.65); }
body.light .nav-link.active { background: rgba(9,105,218,0.08); border-color: rgba(9,105,218,0.30); color: #0969da; }
body.light .icon-btn { background: rgba(0,0,0,0.05); border-color: rgba(0,0,0,0.10); color: var(--text-muted); }
body.light .icon-btn:hover { background: rgba(0,0,0,0.09); border-color: rgba(0,0,0,0.18); color: var(--text-2); }
body.light .icon-btn.active { background: rgba(9,105,218,0.12); border-color: rgba(9,105,218,0.40); color: var(--accent); }
body.light .lang-btn { background: transparent; border-color: rgba(0,0,0,0.12); color: rgba(0,0,0,0.42); }
body.light .lang-btn:hover { background: rgba(0,0,0,0.05); border-color: rgba(0,0,0,0.18); color: rgba(0,0,0,0.65); }
body.light .lang-btn.active { background: rgba(9,105,218,0.08); border-color: rgba(9,105,218,0.30); color: #0969da; }
body.light .theme-btn { background: transparent; border-color: rgba(0,0,0,0.12); color: rgba(0,0,0,0.42); }
body.light .theme-btn:hover { background: rgba(0,0,0,0.05); border-color: rgba(0,0,0,0.18); color: rgba(0,0,0,0.65); }

/* Hamburger */
.hamburger { display: flex; flex-direction: column; gap: 4px; cursor: pointer; padding: 4px; background: none; border: none; flex-shrink: 0; }
.hamburger span { display: block; width: 20px; height: 2px; background: var(--text-muted); border-radius: 2px; transition: background 0.2s; }
.hamburger:hover span { background: var(--text-2); }

/* Status */
.status-bar { padding: 5px 24px; background: var(--glass-sidebar); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur); border-bottom: 1px solid var(--border); font-size: 12px; color: var(--text-faint); display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text-faint); flex-shrink: 0; transition: background 0.3s; }
.status-dot.connected { background: var(--green); }
.status-dot.error { background: var(--red); }
.status-dot.sleeping { background: var(--yellow); animation: blink 1s ease-in-out infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* Layout */
.body { display: flex; flex: 1; min-height: 0; position: relative; background: transparent; }

/* Overlay */
.sidebar-overlay { display: none; position: fixed; inset: 0; background: var(--shadow); z-index: 100; }
.sidebar-overlay.visible { display: block; }

/* History sidebar — desktop: inline collapsible */
.history-sidebar { width: 220px; background: var(--bg-card2); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; overflow: hidden; transition: width 0.25s ease; }
.history-sidebar.collapsed { width: 0; }
.history-sidebar-header { padding: 12px 16px; font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.8px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; white-space: nowrap; }
.new-chat-btn { padding: 3px 9px; background: var(--bg-accent); border: 1px solid var(--border-accent); border-radius: 4px; color: var(--accent); font-size: 11px; cursor: pointer; }
.new-chat-btn:hover { background: #24426e; }
.history-search { padding: 8px 10px; border-bottom: 1px solid var(--border); display: flex; gap: 5px; }
.history-search input { flex: 1; background: var(--bg-input); border: 1px solid var(--border); border-radius: 5px; color: var(--text-2); font-size: 12px; padding: 5px 9px; outline: none; min-width: 0; }
.history-search input::placeholder { color: var(--text-faint2); }
.history-search input:focus { border-color: var(--accent); }
.search-btn { background: var(--bg-accent); border: 1px solid var(--border-accent); border-radius: 5px; color: var(--accent); cursor: pointer; padding: 0 8px; font-size: 13px; flex-shrink: 0; }
.search-btn:hover { background: #24426e; }
.history-list { flex: 1; overflow-y: auto; }
.history-list::-webkit-scrollbar { width: 4px; }
.history-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
.history-item { padding: 8px 8px 8px 16px; cursor: pointer; border-bottom: 1px solid var(--bg-hover); transition: background 0.12s; display: flex; align-items: center; gap: 4px; }
.history-item:hover { background: var(--bg-hover); }
.history-item.active { background: var(--bg-accent2); border-left: 3px solid var(--accent); padding-left: 13px; }
.history-item-content { flex: 1; min-width: 0; }
.history-item-title { font-size: 12px; color: var(--text-2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.history-item-time { font-size: 10px; color: var(--text-faint2); margin-top: 2px; }
.history-item-menu { flex-shrink: 0; width: 26px; height: 26px; display: flex; align-items: center; justify-content: center; border-radius: 4px; color: #3a4258; font-size: 15px; opacity: 1; transition: color 0.1s, background 0.1s; cursor: pointer; line-height: 1; }
.history-item:hover .history-item-menu { color: #6b7491; }
.history-item-menu:hover { background: var(--border); color: var(--text-2); }
.history-empty { padding: 20px 16px; font-size: 12px; color: var(--text-faint2); text-align: center; }
.load-more-btn { display: block; width: 100%; padding: 9px; background: none; border: none; border-top: 1px solid var(--border); color: var(--accent); font-size: 12px; cursor: pointer; }
.load-more-btn:hover { background: var(--bg-hover); }
.load-more-btn:disabled { color: var(--text-faint2); cursor: default; }
.section-label { padding: 6px 16px 4px; font-size: 10px; color: var(--text-faint2); text-transform: uppercase; letter-spacing: 0.8px; font-weight: 600; }
.section-gap { height: 8px; background: var(--bg-hover); border-top: 1px solid var(--bg-hover); border-bottom: 1px solid var(--bg-hover); flex-shrink: 0; }
.pinned-section { max-height: 270px; overflow-y: auto; }
.pinned-section::-webkit-scrollbar { width: 4px; }
.pinned-section::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
.item-dropdown { position: fixed; background: var(--bg-hover); border: 1px solid var(--border); border-radius: 6px; z-index: 500; min-width: 130px; box-shadow: 0 4px 16px var(--shadow); display: none; }
.item-dropdown.open { display: block; }
.item-dropdown-item { padding: 8px 14px; font-size: 12px; color: var(--text-2); cursor: pointer; white-space: nowrap; }
.item-dropdown-item:hover { background: var(--bg-header-end); }
.item-dropdown-item.danger { color: var(--red); }
.rename-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 600; display: none; align-items: center; justify-content: center; }
.rename-modal.open { display: flex; }
.rename-box { background: var(--bg-hover); border: 1px solid var(--border); border-radius: 10px; padding: 20px; width: 300px; }
.rename-box h4 { font-size: 14px; color: var(--text); margin-bottom: 12px; }
.rename-box input { width: 100%; background: var(--bg-input); border: 1px solid var(--border); border-radius: 6px; color: var(--text); padding: 8px 10px; font-size: 13px; outline: none; }
.rename-box input:focus { border-color: var(--accent); }
.rename-box-btns { display: flex; gap: 8px; margin-top: 12px; justify-content: flex-end; }
.rename-box-btns button { padding: 6px 14px; border-radius: 6px; font-size: 12px; cursor: pointer; border: 1px solid var(--border); background: var(--bg-header-end); color: var(--text-2); }
.rename-box-btns button.primary { background: var(--bg-accent); border-color: var(--accent); color: var(--accent); }

/* Messages */
.messages-wrap { flex: 1; display: flex; flex-direction: column; min-width: 0; background: var(--bg); }
.messages { flex: 1; overflow-y: auto; padding: 20px 24px; display: flex; flex-direction: column; gap: 14px; }
.messages::-webkit-scrollbar { width: 5px; }
.messages::-webkit-scrollbar-track { background: transparent; }
.messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* Bubbles */
.msg { display: flex; flex-direction: column; max-width: 72%; }
.msg.user { align-self: flex-end; align-items: flex-end; }
.msg.agent { align-self: flex-start; align-items: flex-start; }
.bubble { padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.6; white-space: pre-wrap; word-break: break-word; }
.msg.user .bubble { background: var(--bg-accent); border: 1px solid var(--border-accent); color: var(--text-2); border-bottom-right-radius: 3px; }
.msg.agent .bubble { background: var(--bg-card); border: 1px solid var(--border); color: var(--text); border-bottom-left-radius: 3px; }
.msg-meta { font-size: 11px; color: var(--text-faint); margin-top: 3px; display: flex; gap: 6px; }
.meta-tag { background: var(--bg-header-end); padding: 1px 7px; border-radius: 10px; }
.msg-time { font-size: 10px; color: var(--text-faint2); margin-top: 2px; }
.history-divider { text-align: center; font-size: 11px; color: var(--text-faint2); padding: 8px 0; border-bottom: 1px solid var(--border); margin-bottom: 4px; }
.msg-image { max-width: 220px; max-height: 220px; border-radius: 8px; display: block; margin-bottom: 4px; border: 1px solid var(--border); }

/* Thinking */
.thinking { display: flex; gap: 4px; align-items: center; padding: 10px 14px; }
.thinking span { width: 7px; height: 7px; border-radius: 50%; background: #444c5e; animation: pulse 1.2s ease-in-out infinite; }
.thinking span:nth-child(2) { animation-delay: 0.2s; }
.thinking span:nth-child(3) { animation-delay: 0.4s; }
@keyframes pulse { 0%,80%,100%{opacity:0.3;transform:scale(0.8)} 40%{opacity:1;transform:scale(1)} }

/* Input */
.input-area { padding: 10px 16px 18px; background: transparent; border-top: 1px solid var(--card-border); flex-shrink: 0; }
.attachment-preview { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; padding: 6px 12px; background: var(--glass-card); border: 1px solid var(--card-border); border-radius: 12px; box-shadow: var(--card-shadow); }
.attachment-thumb { width: 36px; height: 36px; object-fit: cover; border-radius: 6px; }
.attachment-name { flex: 1; font-size: 12px; color: var(--text-muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.attachment-remove { background: none; border: none; color: var(--text-faint); cursor: pointer; font-size: 16px; padding: 0 2px; line-height: 1; }
.attachment-remove:hover { color: var(--red); }
.input-row { display: flex; gap: 8px; align-items: center; }
.input-pill { flex: 1; display: flex; align-items: flex-end; background: var(--glass-card); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid var(--card-border); border-radius: 24px; padding: 5px 5px 5px 10px; gap: 2px; box-shadow: var(--card-shadow); transition: border-color 0.15s; }
.input-pill:focus-within { border-color: rgba(88,166,255,0.35); }
.input-icon-btn { width: 32px; height: 32px; background: transparent; border: none; border-radius: 50%; color: var(--text-muted); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; transition: all 0.15s; }
.input-icon-btn:hover { background: var(--bg-hover); color: var(--text-2); }
.input-icon-btn.recording { color: var(--red); background: rgba(248,81,73,0.15); animation: blink 0.8s ease-in-out infinite; }
textarea { flex: 1; background: transparent; border: none; color: var(--text); font-family: inherit; font-size: 14px; padding: 7px 4px; resize: none; outline: none; line-height: 1.5; min-height: 32px; max-height: 130px; align-self: flex-end; }
textarea::placeholder { color: var(--text-faint2); }
textarea:disabled { opacity: 0.4; }
button.send { width: 36px; height: 36px; background: var(--accent); border: none; border-radius: 50%; color: #fff; font-size: 0; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.2s; box-shadow: 0 2px 10px rgba(89,166,255,0.35); }
button.send::after { content: '↑'; font-size: 18px; font-weight: 700; line-height: 1; }
button.send:hover:not(:disabled) { transform: scale(1.08); box-shadow: 0 4px 16px rgba(89,166,255,0.5); }
button.send:disabled { opacity: 0.35; cursor: not-allowed; transform: none; box-shadow: none; }
.hint { font-size: 11px; color: var(--text-faint2); margin-top: 6px; }

/* Settings Panel */
.settings-panel { width: 0; background: var(--glass-sidebar); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur); border-left: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; overflow: hidden; transition: width 0.2s ease; }
.settings-panel.open { width: 340px; overflow-y: auto; }
.settings-panel::-webkit-scrollbar { width: 4px; }
.settings-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
.settings-inner { width: 340px; }
.settings-header { padding: 18px 24px 14px; font-size: 14px; font-weight: 600; color: var(--text-2); border-bottom: 1px solid var(--border); }
.settings-section { padding: 20px 24px; border-bottom: 1px solid var(--bg-hover); }
.settings-section h4 { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 14px; }
.toggle-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.toggle-label { font-size: 14px; color: var(--text-2); }
.toggle-sub { font-size: 12px; color: var(--text-faint); margin-top: 3px; }
.toggle { position: relative; width: 40px; height: 22px; flex-shrink: 0; }
.toggle input { opacity: 0; width: 0; height: 0; }
.toggle-slider { position: absolute; inset: 0; background: var(--border); border-radius: 22px; cursor: pointer; transition: background 0.2s; }
.toggle-slider::before { content: ''; position: absolute; width: 16px; height: 16px; left: 3px; bottom: 3px; background: var(--text-muted); border-radius: 50%; transition: transform 0.2s, background 0.2s; }
.toggle input:checked + .toggle-slider { background: var(--bg-accent); }
.toggle input:checked + .toggle-slider::before { transform: translateX(18px); background: var(--accent); }
.schedule-mode { display: flex; margin-bottom: 14px; border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
.mode-btn { flex: 1; padding: 7px 0; background: var(--bg-hover); border: none; color: var(--text-muted); font-size: 12px; cursor: pointer; transition: all 0.15s; }
.mode-btn.active { background: var(--bg-accent2); color: var(--accent); }
.schedule-config { margin-bottom: 4px; }
.config-row { display: flex; align-items: center; gap: 8px; margin-top: 4px; }
.config-row label { font-size: 12px; color: var(--text-muted); white-space: nowrap; }
.config-input { flex: 1; background: var(--bg-hover); border: 1px solid var(--border); border-radius: 5px; color: var(--text); font-size: 13px; padding: 6px 10px; outline: none; }
.config-input:focus { border-color: #444c5e; }
input[type="number"].config-input { -moz-appearance: textfield; }
input[type="number"].config-input::-webkit-inner-spin-button { -webkit-appearance: none; }
.sleep-btn { width: 100%; padding: 10px; background: var(--bg-hover); border: 1px solid var(--border); border-radius: 6px; color: var(--text-2); font-size: 13px; cursor: pointer; margin-top: 12px; transition: all 0.15s; }
.sleep-btn:hover:not(:disabled) { border-color: var(--yellow); color: var(--yellow); }
.sleep-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.sleep-btn.running { border-color: var(--yellow); color: var(--yellow); }
.sleep-btn.success { border-color: var(--green); color: var(--green); }
.sleep-status { margin-top: 12px; padding: 10px 14px; border-radius: 6px; font-size: 13px; display: none; line-height: 1.5; }
.sleep-status.running { background: #2a2010; border: 1px solid var(--yellow); color: var(--yellow); display: block; }
.sleep-status.success { background: #0d2118; border: 1px solid var(--green); color: var(--green); display: block; }

<script>
const API_PORT = 8400;
const STORAGE_KEY = 'jkriver_session_id';
const TOKEN_COOKIE = 'jkriver_token';

function getDeviceToken() {
    const match = document.cookie.match(/(?:^|;\s*)jkriver_token=([^;]*)/);
    return match ? decodeURIComponent(match[1]) : '';
}

function localISOTime() {
    const now = new Date();
    const pad = n => String(n).padStart(2, '0');
    const off = -now.getTimezoneOffset();
    const sign = off >= 0 ? '+' : '-';
    const hh = pad(Math.floor(Math.abs(off) / 60));
    const mm = pad(Math.abs(off) % 60);
    return `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}T${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}${sign}${hh}:${mm}`;
}

function authHeaders(extra) {
    const token = getDeviceToken();
    const h = { 'Content-Type': 'application/json', ...(extra || {}) };
    if (token) h['X-Device-Token'] = token;
    return h;
}
const AUTO_SLEEP_KEY = 'jkriver_auto_sleep';

let waiting = false;

let pendingImage = null; // { file, dataUrl }

    pinned_label: 'ピン留め', history_label: '履歴', pin: 'ピン留め', unpin: 'ピン解除',

function detectLang() {
  const saved = localStorage.getItem(LANG_KEY);
  if (saved && I18N[saved]) return saved;
  const lang = (navigator.language || 'en').toLowerCase();
  if (lang.startsWith('zh')) return 'zh';
  if (lang.startsWith('ja')) return 'ja';
  return 'en';
}
let currentLang = detectLang();

function t(key, params) {
  let s = (I18N[currentLang] || I18N.en)[key] || key;
  if (params) { for (const [k, v] of Object.entries(params)) s = s.replace(`{${k}}`, v); }
  return s;
}

function setLang(lang) {
  currentLang = lang;
  localStorage.setItem(LANG_KEY, lang);
  const labels = { zh: '中文', en: 'EN', ja: '日本語' };
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.textContent.trim() === labels[lang]));
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.dataset.i18n;
    if (I18N[lang][key]) el.textContent = I18N[lang][key];
  });
  document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
    const key = el.dataset.i18nPlaceholder;
    if (I18N[lang][key]) el.placeholder = I18N[lang][key];
  });
  document.querySelectorAll('[data-i18n-title]').forEach(el => {
    const key = el.dataset.i18nTitle;
    if (I18N[lang][key]) el.title = I18N[lang][key];
  });
  const dot = document.getElementById('statusDot');
  if (dot.classList.contains('connected')) setStatus('connected', t('connected'));
  else if (dot.classList.contains('error')) setStatus('error', t('disconnected'));
  updateNextRunLabel();
}

// ── Sidebar ────────────────────────────────────────────────────────────
function isMobile() { return window.innerWidth <= 768; }

function toggleSidebar() {
  if (isMobile()) {
    sidebarOpen = !sidebarOpen;
    document.getElementById('historySidebar').classList.toggle('open', sidebarOpen);
    document.getElementById('sidebarOverlay').classList.toggle('visible', sidebarOpen);
  } else {
    // Desktop: collapse/expand inline
    const sidebar = document.getElementById('historySidebar');
    const collapsed = sidebar.classList.toggle('collapsed');
    localStorage.setItem(SIDEBAR_KEY, collapsed ? '0' : '1');
  }
}

function closeSidebar() {
  sidebarOpen = false;
  document.getElementById('historySidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('visible');
}

// ── Image attachment ───────────────────────────────────────────────────
function triggerImagePicker() {
  document.getElementById('imageInput').click();
}

function onImageSelected(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    pendingImage = { file, dataUrl: e.target.result };
    document.getElementById('attachmentThumb').src = e.target.result;
    document.getElementById('attachmentName').textContent = file.name;
    document.getElementById('attachmentPreview').style.display = 'flex';
  };
  reader.readAsDataURL(file);
  input.value = '';
}

function clearAttachment() {
  pendingImage = null;
  document.getElementById('attachmentPreview').style.display = 'none';
  document.getElementById('attachmentThumb').src = '';
}

// ── Voice input ────────────────────────────────────────────────────────
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

function toggleVoice() {
  if (!SpeechRecognition) { alert(t('voice_no_support')); return; }
  if (isRecording) {
    stopVoice();
  } else {
    startVoice();
  }
}

function startVoice() {
  recognition = new SpeechRecognition();
  const langMap = { zh: 'zh-CN', en: 'en-US', ja: 'ja-JP' };
  recognition.lang = langMap[currentLang] || 'zh-CN';
  recognition.continuous = false;
  recognition.interimResults = false;

  recognition.onresult = (e) => {
    const text = e.results[0][0].transcript;
    const input = document.getElementById('input');
    input.value = (input.value ? input.value + ' ' : '') + text;
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 140) + 'px';
  };
  recognition.onend = () => stopVoice();
  recognition.onerror = () => stopVoice();

  recognition.start();
  isRecording = true;
  document.getElementById('voiceBtn').classList.add('recording');
}

function stopVoice() {
  if (recognition) { try { recognition.stop(); } catch(e) {} recognition = null; }
  isRecording = false;
  document.getElementById('voiceBtn').classList.remove('recording');
}

// ── Send message ───────────────────────────────────────────────────────
async function sendMessage() {
  const input = document.getElementById('input');
  const text = input.value.trim();
  if ((!text && !pendingImage) || waiting) return;

  if (pendingImage) {
    await sendImageMessage(text);
    return;
  }

  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  appendMessage('user', text, '', '');
  ws.send(JSON.stringify({ message: text, client_time: localISOTime() }));
  input.value = '';
  input.style.height = 'auto';
  waiting = true;
  document.getElementById('sendBtn').disabled = true;
  showThinking();
}

async function sendImageMessage(caption) {
  const input = document.getElementById('input');
  const file = pendingImage.file;
  const dataUrl = pendingImage.dataUrl;

  // Show user message with image
  appendImageMessage('user', dataUrl, caption);
  input.value = '';
  input.style.height = 'auto';
  clearAttachment();
  waiting = true;
  document.getElementById('sendBtn').disabled = true;
  showThinking();

  try {
    // Upload file
    const formData = new FormData();
    formData.append('file', file);
    const uploadHeaders = {};
    const tok = getDeviceToken();
    if (tok) uploadHeaders['X-Device-Token'] = tok;
    const upRes = await fetch(`http://${location.hostname}:${API_PORT}/upload`, {
      method: 'POST', body: formData, headers: uploadHeaders,
    });
    if (!upRes.ok) throw new Error('Upload failed');
    const { file_path } = await upRes.json();

    // Send via REST /chat
    const chatRes = await fetch(`http://${location.hostname}:${API_PORT}/chat`, {
      method: 'POST',
      headers: authHeaders(),
      body: JSON.stringify({
        message: caption,
        session_id: sessionId,
        input_type: 'image',
        file_path,
        client_time: localISOTime(),
      }),
    });
    if (!chatRes.ok) throw new Error('Chat failed');
    const result = await chatRes.json();
    removeThinking();
    waiting = false;
    document.getElementById('sendBtn').disabled = false;
    appendMessage('agent', result.response, result.category, result.intent);
  } catch(e) {
    removeThinking();
    waiting = false;
    document.getElementById('sendBtn').disabled = false;
    appendMessage('agent', '⚠ ' + e.message, 'error', '');
  }
}

// ── Init ──────────────────────────────────────────────────────────────
async function init() {
  setLang(currentLang);
  // Restore sidebar state on desktop
  if (!isMobile()) {
    const saved = localStorage.getItem(SIDEBAR_KEY);
    if (saved === '0') document.getElementById('historySidebar').classList.add('collapsed');
  }
  // Hide voice button if browser doesn't support Web Speech API
  if (!window.SpeechRecognition && !window.webkitSpeechRecognition) {
    document.getElementById('voiceBtn').style.display = 'none';
  }
  // Check backend capabilities and hide unsupported buttons
  try {
    const res = await fetch(`http://${location.hostname}:${API_PORT}/capabilities`, { headers: authHeaders() });
    if (res.ok) {
      const cap = await res.json();
      if (!cap.image) document.getElementById('imageInputBtn').style.display = 'none';
      // voice button: hide if neither browser nor backend supports it
      if (!cap.voice && !window.SpeechRecognition && !window.webkitSpeechRecognition) {
        document.getElementById('voiceBtn').style.display = 'none';
      }
    }
  } catch {
    // API unreachable — keep buttons visible, errors handled at send time
  }
  loadAutoSleepSetting();
  await loadSessionList();
  if (sessionId) await loadHistory(sessionId);
  connect();
}

// ── Session list ──────────────────────────────────────────────────────
let allSessions = [];
let pinnedSessions = [];
let sessionOffset = 0;
const SESSION_PAGE = 30;
let sessionHasMore = false;
let searchTimer = null;

async function loadSessionList() {
  sessionOffset = 0;
  allSessions = [];
  try {
    const [pinnedRes, histRes] = await Promise.all([
      fetch(`http://${location.hostname}:${API_PORT}/sessions/pinned`, { headers: authHeaders() }),
      fetch(`http://${location.hostname}:${API_PORT}/sessions?limit=${SESSION_PAGE}&offset=0`, { headers: authHeaders() }),
    ]);
    pinnedSessions = pinnedRes.ok ? await pinnedRes.json() : [];
    if (!histRes.ok) return;
    allSessions = await histRes.json();
    sessionOffset = allSessions.length;
    sessionHasMore = allSessions.length === SESSION_PAGE;
    renderPinnedList(pinnedSessions);
    renderSessionList(allSessions);
    document.getElementById('loadMoreBtn').style.display = sessionHasMore ? '' : 'none';
  } catch(e) { console.warn('Failed to load session list', e); }
}

async function doSearch() {
  clearTimeout(searchTimer);
  const q = document.getElementById('sessionSearch').value;
  if (!q.trim()) {
    renderPinnedList(pinnedSessions);
    renderSessionList(allSessions);
    document.getElementById('loadMoreBtn').style.display = sessionHasMore ? '' : 'none';
    return;
  }
  document.getElementById('loadMoreBtn').style.display = 'none';
  try {
    const res = await fetch(`http://${location.hostname}:${API_PORT}/sessions/search?q=${encodeURIComponent(q)}`, { headers: authHeaders() });
    if (!res.ok) return;
    const results = await res.json();
    renderPinnedList([]);
    renderSessionList(results);
  } catch(e) { console.warn('search failed', e); }
}

function filterSessions(q) {
  clearTimeout(searchTimer);
  if (!q.trim()) {
    renderPinnedList(pinnedSessions);
    renderSessionList(allSessions);
    document.getElementById('loadMoreBtn').style.display = sessionHasMore ? '' : 'none';
    return;
  }
  searchTimer = setTimeout(doSearch, 300);
}

async function loadMoreSessions() {
  const btn = document.getElementById('loadMoreBtn');
  btn.disabled = true;
  try {
    const res = await fetch(`http://${location.hostname}:${API_PORT}/sessions?limit=${SESSION_PAGE}&offset=${sessionOffset}`, { headers: authHeaders() });
    if (!res.ok) return;
    const more = await res.json();
    allSessions = allSessions.concat(more);
    sessionOffset += more.length;
    sessionHasMore = more.length === SESSION_PAGE;
    renderSessionList(allSessions);
    btn.style.display = sessionHasMore ? '' : 'none';
  } catch(e) { console.warn('load more failed', e); }
  btn.disabled = false;
}

function renderSessionItem(s) {
  const title = escHtml(s.custom_name || s.preview || s.session_id.slice(0, 8) + '…');
  const date = s.started_at ? formatDate(s.started_at) : (s.last_at ? formatDate(s.last_at) : '');
  const isActive = s.session_id === sessionId;
  const pinned = s.pinned || false;
  return `<div class="history-item${isActive ? ' active' : ''}" data-sid="${s.session_id}" onclick="switchSession('${s.session_id}')">
    <div class="history-item-content">
      <div class="history-item-title">${title}</div>
      <div class="history-item-time">${date}</div>
    </div>
    <div class="history-item-menu" onclick="showItemMenu(event,'${s.session_id}',${pinned})" title="${t('more')}">⋯</div>
  </div>`;
}

function renderPinnedList(sessions) {
  const wrapper = document.getElementById('pinnedWrapper');
  const list = document.getElementById('pinnedList');
  if (!sessions.length) { wrapper.style.display = 'none'; return; }
  wrapper.style.display = '';
  list.innerHTML = sessions.map(renderSessionItem).join('');
}

function renderSessionList(sessions) {
  const list = document.getElementById('historyList');
  if (!sessions.length) {
    list.innerHTML = `<div class="history-empty">${t('history_empty')}</div>`;
    return;
  }
  list.innerHTML = sessions.map(renderSessionItem).join('');
}

// ── Session actions (pin / rename / delete) ────────────────────────────
let _renameTargetId = null;

function showItemMenu(event, sid, pinned) {
  event.stopPropagation();
  closeDropdown();
  const dd = document.getElementById('itemDropdown');
  dd.innerHTML = `
    <div class="item-dropdown-item" onclick="togglePin('${sid}',${pinned})">${pinned ? t('unpin') : t('pin')}</div>
    <div class="item-dropdown-item" onclick="openRenameModal('${sid}')">${t('rename')}</div>
    <div class="item-dropdown-item danger" onclick="confirmDelete('${sid}')">${t('delete_session')}</div>
  `;
  const rect = event.currentTarget.getBoundingClientRect();
  dd.classList.add('open');
  const ddH = dd.offsetHeight || 96;
  const top = rect.bottom + 4 + ddH > window.innerHeight ? rect.top - ddH - 4 : rect.bottom + 4;
  dd.style.top = top + 'px';
  dd.style.left = Math.max(4, rect.right - 134) + 'px';
}

function closeDropdown() {
  document.getElementById('itemDropdown').classList.remove('open');
}

document.addEventListener('click', closeDropdown);

async function togglePin(sid, currentPinned) {
  closeDropdown();
  try {
    await fetch(`http://${location.hostname}:${API_PORT}/sessions/${sid}/pin`, { method: 'POST', headers: authHeaders() });
    await loadSessionList();
  } catch(e) { console.warn('pin failed', e); }
}

function openRenameModal(sid) {
  closeDropdown();
  _renameTargetId = sid;
  const s = [...pinnedSessions, ...allSessions].find(x => x.session_id === sid);
  document.getElementById('renameInput').value = (s && s.custom_name) ? s.custom_name : '';
  document.getElementById('renameModal').classList.add('open');
  setTimeout(() => document.getElementById('renameInput').focus(), 50);
}

function closeRenameModal() {
  document.getElementById('renameModal').classList.remove('open');
  _renameTargetId = null;
}

async function confirmRename() {
  const sid = _renameTargetId;
  const name = document.getElementById('renameInput').value.trim();
  closeRenameModal();
  if (!sid) return;
  try {
    await fetch(`http://${location.hostname}:${API_PORT}/sessions/${sid}/rename`, {
      method: 'PATCH',
      headers: { ...authHeaders(), 'Content-Type': 'application/json' },
      body: JSON.stringify({ name }),
    });
    await loadSessionList();
  } catch(e) { console.warn('rename failed', e); }
}

async function confirmDelete(sid) {
  closeDropdown();
  if (!confirm(t('delete_confirm'))) return;
  try {
    await fetch(`http://${location.hostname}:${API_PORT}/sessions/${sid}`, { method: 'DELETE', headers: authHeaders() });
    if (sid === sessionId) {
      sessionId = null;
      localStorage.removeItem(STORAGE_KEY);
      document.getElementById('messages').innerHTML = '';
    }
    await loadSessionList();
  } catch(e) { console.warn('delete failed', e); }
}

function formatDate(iso) {
  const d = new Date(iso), now = new Date();
  const diffDays = Math.floor((now - d) / 86400000);
  if (diffDays === 0) return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  if (diffDays === 1) return currentLang === 'zh' ? '昨天' : currentLang === 'ja' ? '昨日' : 'Yesterday';
  if (diffDays < 7) return `${diffDays}${currentLang === 'zh' ? '天前' : currentLang === 'ja' ? '日前' : 'd ago'}`;
  const sameYear = d.getFullYear() === now.getFullYear();
  if (sameYear) return `${d.getMonth()+1}/${d.getDate()}`;
  return currentLang === 'zh'
    ? `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}`
    : currentLang === 'ja'
    ? `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`
    : `${d.getMonth()+1}/${d.getDate()}/${d.getFullYear()}`;
}

function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

async function switchSession(sid) {
  if (sid === sessionId) { closeSidebar(); return; }
  if (ws) ws.close();
  sessionId = sid;
  localStorage.setItem(STORAGE_KEY, sid);
  document.getElementById('messages').innerHTML = '';
  document.getElementById('input').disabled = true;
  document.getElementById('sendBtn').disabled = true;
  document.querySelectorAll('.history-item').forEach(el =>
    el.classList.toggle('active', el.dataset.sid === sid));
  closeSidebar();
  await loadHistory(sid);
  connect();
}

// ── WebSocket ─────────────────────────────────────────────────────────
function connect() {
  const tok = getDeviceToken();
  const tokenParam = tok ? `&token=${encodeURIComponent(tok)}` : '';
  const url = sessionId
    ? `ws://${location.hostname}:${API_PORT}/ws/chat?session_id=${sessionId}${tokenParam}`
    : `ws://${location.hostname}:${API_PORT}/ws/chat${tok ? '?token=' + encodeURIComponent(tok) : ''}`;
  ws = new WebSocket(url);
  ws.onopen = () => setStatus('connected', t('connected'));
  ws.onmessage = (e) => {
    const data = JSON.parse(e.data);
    if (data.type === 'session_created') {
      const isNew = !sessionId || sessionId !== data.session_id;
      sessionId = data.session_id;
      localStorage.setItem(STORAGE_KEY, sessionId);
      document.getElementById('sessionIdDisplay').textContent = sessionId;
      document.getElementById('input').disabled = false;
      document.getElementById('sendBtn').disabled = false;
      document.getElementById('input').focus();
      if (isNew) loadSessionList();
      return;
    }
    removeThinking();
    waiting = false;
    document.getElementById('sendBtn').disabled = false;
    if (data.type === 'response') appendMessage('agent', data.response, data.category, data.intent);
    else if (data.type === 'error') appendMessage('agent', '⚠ ' + data.detail, 'error', '');
  };
  ws.onclose = () => {
    setStatus('error', t('disconnected'));
    document.getElementById('input').disabled = true;
    document.getElementById('sendBtn').disabled = true;
  };
  ws.onerror = () => setStatus('error', t('disconnected'));
}

// ── History ───────────────────────────────────────────────────────────
async function loadHistory(sid) {
  try {
    const res = await fetch(`http://${location.hostname}:${API_PORT}/session/${sid}/history`, { headers: authHeaders() });
    if (!res.ok) return;
    const history = await res.json();
    if (!history.length) return;
    const container = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'history-divider';
    div.textContent = t('history_divider', { n: history.length });
    container.appendChild(div);
    history.forEach(item => {
      appendMessage('user', item.user, '', '', item.at, true);
      appendMessage('agent', item.agent, '', '', item.at, true);
    });
  } catch(e) { console.warn('Failed to load history', e); }
}

// ── Messages ──────────────────────────────────────────────────────────
function appendMessage(role, text, category, intent, at) {
  const container = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = text;
  div.appendChild(bubble);
  if (role === 'agent' && (category || intent)) {
    const meta = document.createElement('div');
    meta.className = 'msg-meta';
    if (category) meta.innerHTML += `<span class="meta-tag">${category}</span>`;
    if (intent)   meta.innerHTML += `<span class="meta-tag">${intent}</span>`;
    div.appendChild(meta);
  }
  if (at) {
    const time = document.createElement('div');
    time.className = 'msg-time';
    time.textContent = new Date(at).toLocaleString();
    div.appendChild(time);
  }
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function appendImageMessage(role, dataUrl, caption) {
  const container = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  const img = document.createElement('img');
  img.src = dataUrl;
  img.className = 'msg-image';
  bubble.appendChild(img);
  if (caption) {
    const p = document.createElement('div');
    p.textContent = caption;
    bubble.appendChild(p);
  }
  div.appendChild(bubble);
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function showThinking() {
  const container = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg agent';
  div.id = 'thinking';
  div.innerHTML = '<div class="bubble thinking"><span></span><span></span><span></span></div>';
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}
function removeThinking() { const el = document.getElementById('thinking'); if (el) el.remove(); }

// ── Status ────────────────────────────────────────────────────────────
function setStatus(state, text) {
  document.getElementById('statusDot').className = 'status-dot' + (state ? ' ' + state : '');
  document.getElementById('statusText').textContent = text;
}

// ── Settings ──────────────────────────────────────────────────────────
function toggleSettings() {
  settingsOpen = !settingsOpen;
  document.getElementById('settingsPanel').classList.toggle('open', settingsOpen);
  document.getElementById('settingsBtn').classList.toggle('active', settingsOpen);
  if (settingsOpen) closeSidebar();
}

// ── Sleep ─────────────────────────────────────────────────────────────
async function runSleep() {
  const btn = document.getElementById('sleepBtn');
  const status = document.getElementById('sleepStatus');
  btn.disabled = true; btn.className = 'sleep-btn running'; btn.textContent = t('sleep_running_btn');
  status.className = 'sleep-status running'; status.textContent = t('sleep_running');
  setStatus('sleeping', t('sleeping_status'));
  try {
    const res = await fetch(`http://${location.hostname}:${API_PORT}/sleep`, { method: 'POST', headers: authHeaders() });
    if (res.ok) {
      btn.className = 'sleep-btn success'; btn.textContent = t('sleep_success_btn');
      status.className = 'sleep-status success'; status.textContent = t('sleep_success');
      setStatus('connected', t('connected'));
      setTimeout(() => { btn.className = 'sleep-btn'; btn.textContent = t('sleep_btn'); btn.disabled = false; status.className = 'sleep-status'; }, 4000);
    } else { throw new Error(); }
  } catch {
    btn.className = 'sleep-btn'; btn.textContent = t('sleep_btn'); btn.disabled = false;
    status.className = 'sleep-status error'; status.textContent = t('sleep_error');
    setStatus('connected', t('connected'));
  }
}

let scheduleMode = localStorage.getItem(SLEEP_MODE_KEY) || 'interval';
function setScheduleMode(mode) {
  scheduleMode = mode; localStorage.setItem(SLEEP_MODE_KEY, mode);
  document.getElementById('modeInterval').classList.toggle('active', mode === 'interval');
  document.getElementById('modeDaily').classList.toggle('active', mode === 'daily');
  document.getElementById('intervalConfig').style.display = mode === 'interval' ? '' : 'none';
  document.getElementById('dailyConfig').style.display = mode === 'daily' ? '' : 'none';
  if (document.getElementById('autoSleepToggle').checked) startAutoSleep();
}
function saveScheduleConfig() {
  localStorage.setItem(SLEEP_INTERVAL_KEY, document.getElementById('intervalHours').value);
  localStorage.setItem(SLEEP_TIME_KEY, document.getElementById('dailyTime').value);
  if (document.getElementById('autoSleepToggle').checked) startAutoSleep();
}
function loadAutoSleepSetting() {
  const enabled = localStorage.getItem(AUTO_SLEEP_KEY) === 'true';
  document.getElementById('autoSleepToggle').checked = enabled;
  document.getElementById('intervalHours').value = localStorage.getItem(SLEEP_INTERVAL_KEY) || '1';
  document.getElementById('dailyTime').value = localStorage.getItem(SLEEP_TIME_KEY) || '02:00';
  setScheduleMode(scheduleMode);
  document.getElementById('scheduleConfig').style.display = enabled ? '' : 'none';
  updateNextRunLabel();
  if (enabled) startAutoSleep();
}
function onAutoSleepChange() {
  const enabled = document.getElementById('autoSleepToggle').checked;
  localStorage.setItem(AUTO_SLEEP_KEY, enabled);
  document.getElementById('scheduleConfig').style.display = enabled ? '' : 'none';
  if (enabled) { startAutoSleep(); } else { clearTimeout(autoSleepTimer); autoSleepTimer = null; document.getElementById('autoSleepSub').textContent = ''; }
}
function startAutoSleep() {
  clearTimeout(autoSleepTimer);
  updateNextRunLabel();
  autoSleepTimer = setTimeout(() => {
    runSleep().then(() => { if (document.getElementById('autoSleepToggle').checked) startAutoSleep(); });
  }, msUntilNextRun());
}
function msUntilNextRun() {
  if (scheduleMode === 'interval') return (parseFloat(document.getElementById('intervalHours').value) || 1) * 3600000;
  const [hh, mm] = (document.getElementById('dailyTime').value || '02:00').split(':').map(Number);
  const now = new Date(), next = new Date(now);
  next.setHours(hh, mm, 0, 0);
  if (next <= now) next.setDate(next.getDate() + 1);
  return next - now;
}
function updateNextRunLabel() {
  const sub = document.getElementById('autoSleepSub');
  if (!document.getElementById('autoSleepToggle').checked) { sub.textContent = ''; return; }
  if (scheduleMode === 'interval') {
    sub.textContent = t('next_interval', { m: Math.round((parseFloat(document.getElementById('intervalHours').value) || 1) * 60) });
  } else {
    const time = document.getElementById('dailyTime').value || '02:00';
    const [hh, mm] = time.split(':').map(Number);
    const now = new Date(), next = new Date(now);
    next.setHours(hh, mm, 0, 0);
    sub.textContent = t(next <= now ? 'next_daily_tomorrow' : 'next_daily', { time });
  }
}

// ── Session ───────────────────────────────────────────────────────────
function newSession() {
  localStorage.removeItem(STORAGE_KEY); sessionId = null;
  document.getElementById('messages').innerHTML = '';
  document.getElementById('sessionIdDisplay').textContent = '—';
  if (ws) ws.close();
  closeSidebar(); connect(); loadSessionList();
}

document.getElementById('input').addEventListener('keydown', (e) => {

document.getElementById('input').addEventListener('input', function () {
