{% extends "base.html" %}
{% block title %}Tasks{% endblock %}
{% block head_extra %}<link rel="stylesheet" href="/static/css/outsource.css">{% endblock %}
{% block body %}
<div class="header">
  <div class="header-left">
    <div>
      <h1 id="pageTitle">Tasks</h1>
      <div class="subtitle">{{ db_name }}</div>
    </div>
  </div>
  <div class="header-right">
    <a href="/chat" class="nav-link" id="nav-chat">Chat</a>
    <a href="/profile" class="nav-link" id="nav-profile">Profile</a>
    <a href="/outsource" class="nav-link active" id="outsource-nav-link">Tasks</a>
    <a href="/system" class="nav-link" id="nav-system">System</a>
    <div class="lang-switch" style="display:flex;gap:3px;">
      <button class="lang-btn" onclick="setLang('zh')">中文</button>
      <button class="lang-btn" onclick="setLang('en')">EN</button>
      <button class="lang-btn" onclick="setLang('ja')">日本語</button>
    </div>
    <button class="theme-btn" id="theme-toggle" onclick="toggleTheme()" title="Toggle theme"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg></button>
    <button class="mobile-list-btn" id="mobileListBtn" onclick="toggleMobileSidebar()">☰ <span id="mobileListBtnLabel">列表</span></button>
  </div>
</div>

<div class="body">
  <div class="task-sidebar" id="taskSidebar">
    <div class="task-sidebar-header">
      <span id="allTasksLabel">All Tasks</span>
      <div style="display:flex;align-items:center;gap:8px;">
        <span id="taskCount" style="color:var(--text-faint2);font-size:11px;"></span>
        <button class="task-action-btn danger" id="clearAllBtn" onclick="clearAllTasks()" style="padding:2px 8px;">Clear All</button>
      </div>
    </div>
    <div class="task-list" id="taskList">
      <div class="task-empty" id="taskLoadingMsg">Loading...</div>
    </div>
  </div>

  <div class="task-detail" id="taskDetail">
    <button class="mobile-back-btn" id="mobileBackBtn" onclick="goBackToList()">← <span id="mobileBackLabel">返回</span></button>
    <div class="detail-empty" id="detailEmpty">...</div>
    <div id="detailContent" style="display:none; display:flex; flex-direction:column; gap:20px;"></div>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script src="/static/js/outsource.js"></script>
{% endblock %}
