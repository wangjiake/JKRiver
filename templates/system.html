{% extends "base.html" %}
{% block head_title %}<title id="page-title">System — {{ db_name }}</title>{% endblock %}
{% block head_extra %}<link rel="stylesheet" href="/static/css/system.css">{% endblock %}
{% block body %}
<div id="restart-banner" class="restart-banner" style="display:none">
  <span class="banner-msg" id="banner-msg"></span>
  <button class="banner-btn restart" id="btn-restart" onclick="doRestart()"></button>
  <button class="banner-btn revert" id="btn-revert" onclick="doRevert()"></button>
</div>
<div class="header">
  <h1 id="header-title">⚙ System — {{ db_name }}</h1>
  <div class="header-right">
    <a href="/chat" class="nav-link" id="nav-chat">Chat</a>
    <a href="/profile" class="nav-link" id="nav-profile">Profile</a>
    <a href="/outsource" class="nav-link" id="outsource-nav-link">Tasks</a>
    <a href="/system" class="nav-link active" id="nav-system">System</a>
    <div class="lang-switch">
      <button class="lang-btn" onclick="setLang('zh')">中文</button>
      <button class="lang-btn" onclick="setLang('en')">EN</button>
      <button class="lang-btn" onclick="setLang('ja')">日本語</button>
    </div>
    <button class="theme-btn" id="theme-toggle" onclick="toggleTheme()" title="Toggle theme" data-i18n-title="toggle_theme"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg></button>
  </div>
</div>

<div class="container">
  <div id="content"><div class="loading" id="loading-text">Loading...</div></div>
</div>

<!-- Install Skill Modal -->
<div class="install-modal" id="installSkillModal">
  <div class="install-box">
    <h4 id="installSkillTitle">Install Skill</h4>
    <div class="install-tabs">
      <div class="install-tab active" id="tabPaste" onclick="switchInstallTab('paste')" id="tabPaste"></div>
      <div class="install-tab" id="tabHub" onclick="switchInstallTab('hub')"></div>
    </div>
    <!-- Paste tab -->
    <div class="install-tab-pane active" id="paneInstallPaste">
      <p id="installSkillDesc"></p>
      <textarea id="installSkillYaml" spellcheck="false"></textarea>
      <div class="install-box-btns">
        <button id="installCancelBtn" onclick="closeInstallSkill()">Cancel</button>
        <button id="installConfirmBtn" class="primary" onclick="doInstallSkill()">Install</button>
      </div>
    </div>
    <!-- SkillHub tab -->
    <div class="install-tab-pane" id="paneInstallHub">
      <p id="hubDesc"></p>
      <div class="hub-search-row">
        <input type="text" id="hubSkillName" placeholder="explain-code" />
        <button id="hubFetchBtn" onclick="doFetchFromHub()"></button>
      </div>
      <div class="hub-status" id="hubStatus"></div>
      <div class="install-box-btns">
        <button id="hubCancelBtn" onclick="closeInstallSkill()">Cancel</button>
      </div>
    </div>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>const DB_NAME = {{ db_name | tojson }};</script>
<script src="/static/js/system.js"></script>
{% endblock %}
