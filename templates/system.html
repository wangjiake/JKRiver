<html lang="en">

<style>
:root {
  --bg: #161e2c;
  --bg-card: #1a2234;
  --bg-card2: #182030;
  --bg-header-start: #1a2030;
  --bg-header-end: #1e2636;
  --bg-input: #141c28;
  --bg-hover: #1e2636;
  --bg-hover2: #1c2432;
  --bg-accent: #1e3252;
  --bg-accent2: #1a2a3e;
  --border: #28344a;
  --border-light: #1e2838;
  --border-accent: #2a4468;
  --text: #b8c8d8;
  --text-2: #a8b8cc;
  --text-muted: #6e7e94;
  --text-faint: #506070;
  --text-faint2: #3a4858;
  --accent: #58a6ff;
  --green: #3fb950;
  --yellow: #d29922;
  --red: #f85149;
  --purple: #bc8cff;
  --shadow: rgba(0,0,0,0.5);
  --glass-bg: rgba(24, 30, 42, 0.68);
  --glass-sidebar: rgba(20, 26, 36, 0.80);
  --glass-card: rgba(28, 34, 48, 0.92);
  --glass-input: rgba(18, 22, 34, 0.84);
  --glass-blur: blur(24px) saturate(200%);
  --card-border: rgba(140, 158, 195, 0.16);
  --card-shadow: 0 4px 24px rgba(0, 0, 0, 0.45), inset 0 1px 0 rgba(160, 180, 220, 0.07);
  --body-gradient: linear-gradient(160deg, #1a2030 0%, #1e2838 35%, #1a2830 65%, #1c2038 100%);
}
body.light {
  --bg: #ffffff;
  --bg-card: #f6f8fa;
  --bg-card2: #f0f3f6;
  --bg-header-start: #f6f8fa;
  --bg-header-end: #eaeef2;
  --bg-input: #ffffff;
  --bg-hover: #eaeef2;
  --bg-hover2: #e8ecf0;
  --bg-accent: #ededf8;
  --bg-accent2: #e0e0f4;
  --border: #d0d7de;
  --border-light: #eaeef2;
  --border-accent: #8a96d8;
  --text: #1f2328;
  --text-2: #24292f;
  --text-muted: #57606a;
  --text-faint: #8c959f;
  --text-faint2: #afb8c1;
  --accent: #4f5fba;
  --green: #1a7f37;
  --yellow: #9a6700;
  --red: #cf222e;
  --purple: #8250df;
  --shadow: rgba(0,0,0,0.15);
  --glass-bg: rgba(255, 255, 255, 0.55);
  --glass-sidebar: rgba(248, 250, 255, 0.60);
  --glass-card: rgba(255, 255, 255, 0.88);
  --glass-input: rgba(255, 255, 255, 0.85);
  --card-border: rgba(0, 0, 0, 0.10);
  --card-shadow: 0 4px 20px rgba(0, 0, 0, 0.14), 0 1px 4px rgba(0, 0, 0, 0.08);
  --body-gradient: linear-gradient(160deg, #dde8ff 0%, #ede6fa 35%, #ddf2ec 65%, #f5e6f5 100%);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html { background-color: #1a2030; }
html.light { background-color: #f5e6f5; }
body { font-family: -apple-system, "Segoe UI", "Microsoft YaHei", sans-serif; background: var(--body-gradient); color: var(--text); min-height: 100vh; }

.header { background: var(--glass-bg); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur); padding: 14px 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 50; }
.header h1 { font-size: 20px; font-weight: 600; color: var(--text); }
.header-right { display: flex; gap: 8px; align-items: center; }
.nav-link { background: transparent; border: 1px solid rgba(255,255,255,0.10); border-radius: 8px; color: rgba(255,255,255,0.48); font-size: 12px; text-decoration: none; transition: all 0.2s; backdrop-filter: blur(12px) saturate(180%); -webkit-backdrop-filter: blur(12px) saturate(180%); padding: 5px 12px; }
.nav-link:hover { background: rgba(255,255,255,0.07); border-color: rgba(255,255,255,0.18); color: rgba(255,255,255,0.72); }
.nav-link.active { background: rgba(88,166,255,0.13); border-color: rgba(88,166,255,0.35); color: #58a6ff; }
body.light .nav-link { background: transparent; border-color: rgba(0,0,0,0.12); color: rgba(0,0,0,0.42); }
body.light .nav-link:hover { background: rgba(0,0,0,0.05); border-color: rgba(0,0,0,0.18); color: rgba(0,0,0,0.65); }
body.light .nav-link.active { background: rgba(79,95,186,0.08); border-color: rgba(79,95,186,0.30); color: #4f5fba; }
.lang-switch { display: flex; gap: 4px; }
.lang-btn { padding: 4px 10px; background: transparent; border: 1px solid rgba(255,255,255,0.10); border-radius: 8px; color: rgba(255,255,255,0.48); cursor: pointer; font-size: 12px; transition: all 0.2s; backdrop-filter: blur(12px) saturate(180%); -webkit-backdrop-filter: blur(12px) saturate(180%); }
.lang-btn:hover { background: rgba(255,255,255,0.07); border-color: rgba(255,255,255,0.18); color: rgba(255,255,255,0.72); }
.lang-btn.active { background: rgba(88,166,255,0.13); border-color: rgba(88,166,255,0.35); color: #58a6ff; }
body.light .lang-btn { background: transparent; border-color: rgba(0,0,0,0.12); color: rgba(0,0,0,0.42); }
body.light .lang-btn:hover { background: rgba(0,0,0,0.05); border-color: rgba(0,0,0,0.18); color: rgba(0,0,0,0.65); }
body.light .lang-btn.active { background: rgba(79,95,186,0.08); border-color: rgba(79,95,186,0.30); color: #4f5fba; }
.theme-btn { padding: 5px 8px; background: transparent; border: 1px solid rgba(255,255,255,0.10); border-radius: 8px; color: rgba(255,255,255,0.48); cursor: pointer; line-height: 1; display: flex; align-items: center; transition: all 0.2s; backdrop-filter: blur(12px) saturate(180%); -webkit-backdrop-filter: blur(12px) saturate(180%); }
.theme-btn:hover { background: rgba(255,255,255,0.07); border-color: rgba(255,255,255,0.18); color: rgba(255,255,255,0.72); }
body.light .theme-btn { background: transparent; border-color: rgba(0,0,0,0.12); color: rgba(0,0,0,0.42); }
body.light .theme-btn:hover { background: rgba(0,0,0,0.05); border-color: rgba(0,0,0,0.18); color: rgba(0,0,0,0.65); }

.container { max-width: 1100px; margin: 0 auto; padding: 28px 24px; }

.section { margin-bottom: 32px; }
.section-title { font-size: 13px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
.section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

.info-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; }
.info-card { background: var(--glass-card); border: 1px solid var(--card-border); border-radius: 10px; padding: 14px 16px; box-shadow: var(--card-shadow); }
.info-card .label { font-size: 11px; color: var(--text-faint); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
.info-card .value { font-size: 14px; color: var(--text); font-weight: 500; }
.info-card .value.on { color: var(--green); }
.info-card .value.off { color: var(--text-faint); }

.cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
.card { background: var(--glass-card); border: 1px solid var(--card-border); border-radius: 10px; padding: 16px; display: flex; flex-direction: column; gap: 8px; box-shadow: var(--card-shadow); }
.card.disabled { opacity: 0.65; filter: grayscale(50%); }
.card-header { display: flex; align-items: center; gap: 8px; }
.card-name { font-size: 14px; font-weight: 600; color: var(--text); flex: 1; }
.badge { font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 10px; text-transform: uppercase; letter-spacing: 0.05em; flex-shrink: 0; }
.badge-builtin { background: #1f3a5f; color: var(--accent); }
.badge-agent { background: #2d1f5f; color: #a78bfa; }
.badge-mcp { background: #1f4a2d; color: var(--green); }
.badge-skill { background: #3d2a0a; color: var(--yellow); }
.badge-on { background: #1a3a1a; color: var(--green); }
.badge-off { background: #2d2d2d; color: var(--text-faint); }
body.light .badge-builtin { background: #dbeafe; color: #1d4ed8; }
body.light .badge-agent   { background: #ede9fe; color: #6d28d9; }
body.light .badge-mcp     { background: #dcfce7; color: #166534; }
body.light .badge-skill   { background: #fef3c7; color: #92400e; }
body.light .badge-on      { background: #dcfce7; color: #166534; }
body.light .badge-off     { background: #f1f5f9; color: #64748b; }
.card-desc { font-size: 13px; color: var(--text-muted); line-height: 1.5; }
.card-examples { display: flex; flex-wrap: wrap; gap: 6px; }
.example-tag { font-size: 11px; background: var(--glass-card); border: 1px solid var(--border); border-radius: 4px; padding: 3px 8px; color: var(--text-muted); }
.card-meta { font-size: 11px; color: var(--text-faint); }
.card-meta span { color: var(--text-muted); }
.empty { text-align: center; padding: 40px; color: var(--text-faint); font-size: 14px; background: var(--bg-card); border: 1px dashed var(--border); border-radius: 8px; }
.loading { text-align: center; padding: 60px; color: var(--text-faint); }
.restart-banner { position: sticky; top: 0; z-index: 100; background: #2d2000; border-bottom: 1px solid var(--yellow); padding: 10px 24px; display: flex; align-items: center; gap: 12px; font-size: 13px; color: var(--yellow); }
.restart-banner .banner-msg { flex: 1; }
.banner-btn { padding: 5px 14px; border-radius: 4px; border: 1px solid; cursor: pointer; font-size: 12px; font-weight: 600; }
.banner-btn.restart { background: var(--yellow); border-color: var(--yellow); color: var(--bg); }
.banner-btn.revert { background: transparent; border-color: var(--yellow); color: var(--yellow); }
.banner-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.info-card.editable { cursor: pointer; transition: border-color 0.15s; }
.info-card.editable:hover { border-color: #444c5e; }
.info-card.editable:hover .edit-icon { opacity: 1; }
.edit-icon { opacity: 0; font-size: 10px; color: var(--accent); margin-left: 4px; transition: opacity 0.15s; }
.info-card.editing { border-color: var(--accent) !important; background: var(--bg-hover2); }
.edit-input { background: transparent; border: none; color: var(--text); font-size: 14px; font-weight: 500; width: 100%; outline: none; padding: 0; }
.edit-input option { background: var(--bg-hover2); color: var(--text); }
.edit-actions { display: flex; gap: 6px; margin-top: 6px; }
.edit-btn { padding: 2px 10px; font-size: 11px; border-radius: 3px; border: 1px solid; cursor: pointer; font-weight: 600; }
.edit-btn.confirm { background: #238636; border-color: #238636; color: #fff; }
.edit-btn.cancel { background: transparent; border-color: #444c5e; color: var(--text-muted); }
.config-section { background: var(--glass-card); border: 1px solid var(--card-border); border-radius: 10px; overflow: hidden; align-self: start; box-shadow: var(--card-shadow); }
.config-section-header { padding: 12px 16px; display: flex; align-items: center; gap: 10px; cursor: pointer; user-select: none; }
.config-section-header:hover { background: var(--bg-hover2); }
.config-section-title { font-size: 13px; font-weight: 600; color: var(--text); flex: 1; }
.config-section-arrow { font-size: 10px; color: var(--text-faint); transition: transform 0.2s; }
.config-section.open .config-section-arrow { transform: rotate(90deg); }
.config-section-body { display: none; border-top: 1px solid var(--border); }
.config-section.open .config-section-body { display: block; }
.config-field { display: flex; align-items: flex-start; padding: 8px 16px; border-bottom: 1px solid var(--border-light); gap: 12px; min-height: 36px; }
.config-field:last-child { border-bottom: none; }
.config-field-label { font-size: 11px; color: var(--text-faint); width: 130px; flex-shrink: 0; padding-top: 2px; text-transform: uppercase; letter-spacing: 0.05em; }
.config-field-value { font-size: 13px; color: var(--text); flex: 1; }
.config-field.editable .config-field-value { cursor: pointer; padding: 1px 4px; border-radius: 3px; }
.config-field.editable:hover .config-field-value { background: #1e2a3a; color: var(--accent); }
.config-field.editing .config-field-value { background: #1e2a3a; }
.config-field-hint { font-size: 10px; color: var(--text-faint); margin-top: 2px; }
.config-field .edit-input { background: var(--bg-input); border: 1px solid var(--accent); color: var(--text); font-size: 13px; width: 100%; outline: none; padding: 2px 6px; border-radius: 3px; }
.config-field .edit-input option { background: var(--bg-input); }
.config-field .edit-actions { display: flex; gap: 4px; margin-top: 4px; }
.delete-btn { background: transparent; border: none; cursor: pointer; color: var(--text-faint); font-size: 13px; padding: 1px 4px; border-radius: 3px; line-height: 1; flex-shrink: 0; opacity: 0; transition: opacity 0.15s, color 0.15s; }
.card:hover .delete-btn { opacity: 1; }
.delete-btn:hover { color: var(--red); background: #2d1a1a; }
.install-btn { margin-left: auto; padding: 4px 12px; background: var(--bg-accent); border: 1px solid var(--border-accent); border-radius: 5px; color: var(--accent); font-size: 11px; cursor: pointer; font-weight: 600; }
.install-btn:hover { background: #24426e; }
.install-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.65); z-index: 500; display: none; align-items: center; justify-content: center; }
.install-modal.open { display: flex; }
.install-box { background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; padding: 24px; width: 560px; max-width: 96vw; max-height: 90vh; overflow-y: auto; }
.install-box h4 { font-size: 14px; color: var(--text); margin-bottom: 12px; }
.install-tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 14px; }
.install-tab { padding: 6px 16px; font-size: 12px; color: var(--text-faint); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: color 0.15s; }
.install-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.install-tab-pane { display: none; }
.install-tab-pane.active { display: block; }
.install-box p { font-size: 12px; color: var(--text-faint); margin-bottom: 10px; }
.install-box textarea { width: 100%; height: 200px; max-height: 400px; background: var(--bg-input); border: 1px solid var(--border); border-radius: 6px; color: var(--text); padding: 10px; font-size: 12px; font-family: monospace; outline: none; resize: vertical; box-sizing: border-box; }
.install-box textarea:focus { border-color: var(--accent); }
.hub-search-row { display: flex; gap: 8px; margin-bottom: 10px; }
.hub-search-row input { flex: 1; background: var(--bg-input); border: 1px solid var(--border); border-radius: 6px; color: var(--text); padding: 7px 10px; font-size: 13px; outline: none; }
.hub-search-row input:focus { border-color: var(--accent); }
.hub-search-row button { padding: 7px 14px; border-radius: 6px; font-size: 12px; cursor: pointer; border: 1px solid var(--border-accent); background: var(--bg-accent); color: var(--accent); }
.hub-status { font-size: 12px; color: var(--text-faint); min-height: 20px; }
.hub-status.err { color: var(--red); }
.hub-status.ok { color: var(--green); }
.install-box-btns { display: flex; gap: 8px; margin-top: 14px; justify-content: flex-end; }
.install-box-btns button { padding: 6px 16px; border-radius: 6px; font-size: 12px; cursor: pointer; border: 1px solid var(--border); background: var(--bg-header-end); color: var(--text-2); }
.install-box-btns button.primary { background: var(--bg-accent); border-color: var(--accent); color: var(--accent); }
.badge-skillhub { background: #1a1a2e; color: #a78bfa; }
.badge-file { background: #1a2a1a; color: var(--green); }
body.light .badge-skillhub { background: #ede9fe; color: #6d28d9; }
body.light .badge-file     { background: #dcfce7; color: #166534; }
.cp-card { border-bottom: 1px solid var(--border-light); }
.cp-card:last-child { border-bottom: none; }
.cp-header { display: flex; align-items: center; gap: 8px; padding: 9px 16px; cursor: pointer; user-select: none; }
.cp-header:hover { background: var(--bg-hover2); }
.cp-name { font-size: 13px; font-weight: 600; color: var(--text); }
.cp-model { font-size: 12px; color: var(--text-faint); flex: 1; }
.cp-arrow { font-size: 10px; color: var(--text-faint); transition: transform 0.2s; }
.cp-card.open .cp-arrow { transform: rotate(90deg); }
.cp-body { display: none; }
.cp-card.open .cp-body { display: block; }
.cp-add { padding: 10px 16px; border-top: 1px solid var(--border); }
.cp-add-form { display: none; margin-bottom: 10px; display: flex; gap: 6px; flex-wrap: wrap; }
.cp-add-form.hidden { display: none; }
.cp-add-btn { width: 100%; background: transparent; border: 1px dashed var(--border); color: var(--text-faint); padding: 5px; border-radius: 4px; cursor: pointer; font-size: 12px; }
.cp-add-btn:hover { border-color: var(--accent); color: var(--accent); }
.choice-group { display: flex; gap: 4px; }
.choice-btn { padding: 3px 14px; border-radius: 4px; border: 1px solid var(--border); background: transparent; color: var(--text-muted); cursor: pointer; font-size: 12px; font-weight: 500; transition: all 0.15s; }
.choice-btn:hover:not(.active) { border-color: #444c5e; color: var(--text-2); }
.choice-btn.active { background: var(--bg-accent2); border-color: var(--accent); color: var(--accent); }

/* ── Mobile ─────────────────────────────────────────────── */
@media (max-width: 768px) {
  .header { padding: 10px 16px 8px; flex-wrap: wrap; align-items: center; gap: 4px; }
  .header-left { flex: 1; }
  .header-right { width: 100%; flex-wrap: wrap; gap: 5px; }
  .header h1 { font-size: 17px; }
  .lang-btn { padding: 4px 7px; font-size: 11px; }
  .main { padding: 16px; }
}
</style>
</head>

<div id="restart-banner" class="restart-banner" style="display:none">
  <span class="banner-msg" id="banner-msg"></span>

<div class="header">

function detectLang() {
  const saved = localStorage.getItem(LANG_KEY);
  if (saved && I18N[saved]) return saved;
  const br = navigator.language || '';
  if (br.startsWith('zh')) return 'zh';
  if (br.startsWith('ja')) return 'ja';
  return 'en';
}

let currentLang = detectLang();
let _data = null;

function t(key) { return (I18N[currentLang] || I18N.en)[key] || key; }

function setLang(lang) {
  currentLang = lang;
  localStorage.setItem(LANG_KEY, lang);
  document.querySelectorAll('.lang-btn').forEach(b =>
    b.classList.toggle('active', b.textContent === { zh:'中文', en:'EN', ja:'日本語' }[lang]));
  document.getElementById('nav-chat').textContent = t('nav_chat');
  document.getElementById('nav-profile').textContent = t('nav_profile');
  document.getElementById('nav-system').textContent = t('nav_system');
  const themeBtn = document.getElementById('theme-toggle');
  if (themeBtn) themeBtn.title = t('toggle_theme');
  const hubInput = document.getElementById('hubSkillName');
  if (hubInput) hubInput.placeholder = t('hub_placeholder') || 'explain-code';
  const titleText = '⚙ ' + t('nav_system') + ' — ' + DB_NAME;
  document.getElementById('header-title').textContent = titleText;
  document.title = t('nav_system') + ' — ' + DB_NAME;
  if (_data) render(_data);
}

function getDeviceToken() {
  const m = document.cookie.match(/(?:^|;\s*)jkriver_token=([^;]*)/);
  return m ? decodeURIComponent(m[1]) : '';
}
function authHeaders() {
  const h = {};
  const tk = getDeviceToken();
  if (tk) h['X-Device-Token'] = tk;
  return h;
}
function escHtml(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function badge(type) {
  const map = { builtin: 'badge-builtin', agent: 'badge-agent', mcp: 'badge-mcp', skill: 'badge-skill' };
  const label = { builtin: t('badge_builtin'), agent: t('badge_agent'), mcp: t('badge_mcp'), skill: t('badge_skill') };
  return `<span class="badge ${map[type] || 'badge-builtin'}">${label[type] || type}</span>`;
}
function statusBadge(enabled) {
  return enabled
    ? `<span class="badge badge-on">${t('on')}</span>`
    : `<span class="badge badge-off">${t('off')}</span>`;
}
function toggleBadge(type, name, enabled) {
  const cls = enabled ? 'badge-on' : 'badge-off';
  return `<span class="badge ${cls} toggle-badge" style="cursor:pointer" data-type="${escHtml(type)}" data-name="${escHtml(name)}" data-enabled="${enabled}" title="${t('toggle_click')}" onclick="handleToggle(this)">` +
    (enabled ? t('on') : t('off')) + `</span>`;
}


function renderInfoCard(r) {
  const onClass = r.on === true ? 'on' : r.on === false ? 'off' : '';
  // Choice buttons card
  if (r.choice) {
    const btns = r.options.map(o =>
      `<button class="choice-btn${String(r.value) === String(o) ? ' active' : ''}" data-value="${escHtml(o)}" onclick="selectInfoChoice(this)">${escHtml(o)}</button>`
    ).join('');
    return `
    <div class="info-card" data-path="${escHtml(r.path)}" data-current="${escHtml(r.value)}">
      <div class="label">${t(r.key)}</div>
      <div class="value"><div class="choice-group">${btns}</div></div>
    </div>`;
  }
  // Boolean toggle card (ON/OFF clickable)
  if (r.toggle) {
    const curOn = r.on;
    return `
    <div class="info-card editable" data-path="${escHtml(r.path)}" data-current="${curOn}" onclick="toggleConfig(this)">
      <div class="label">${t(r.key)}<span class="edit-icon">✎</span></div>
      <div class="value ${onClass}"><span>${escHtml(r.value)}</span></div>
    </div>`;
  }
  // Read-only card
  if (!r.editable) {
    return `
    <div class="info-card">
      <div class="label">${t(r.key)}</div>
      <div class="value ${onClass}">${escHtml(r.value)}</div>
    </div>`;
  }
  // Text / dropdown / sensitive edit card
  const optionsAttr = r.options ? ` data-options='${JSON.stringify(r.options)}'` : '';
  return `
    <div class="info-card editable" data-path="${escHtml(r.path)}" data-sensitive="${r.sensitive ? 'true' : 'false'}" data-current="${escHtml(r.value)}"${optionsAttr} onclick="startEdit(this)">
      <div class="label">${t(r.key)}<span class="edit-icon">✎</span></div>
      <div class="value ${onClass}"><span>${escHtml(r.value) || '—'}</span></div>
    </div>`;
}

function renderConfigField(f) {
  if (f.choice) {
    const btns = f.options.map(o =>
      `<button class="choice-btn${String(f.value) === String(o) ? ' active' : ''}" data-value="${escHtml(o)}" onclick="selectChoice(this)">${escHtml(f.labels ? f.labels[o] : o)}</button>`
    ).join('');
    return `<div class="config-field" data-path="${escHtml(f.path)}" data-current="${escHtml(f.value)}">
      <div class="config-field-label">${t(f.labelKey)}</div>
      <div class="config-field-value"><div class="choice-group">${btns}</div></div>
    </div>`;
  }
  if (f.separator) {
    return `<div style="padding:6px 16px 4px; font-size:11px; font-weight:600; color:var(--accent); background:var(--bg-input); border-bottom:1px solid var(--border-light); text-transform:uppercase; letter-spacing:0.06em">${escHtml(f.label)}</div>`;
  }
  if (f.toggle) {
    const cls = f.on ? 'on' : 'off';
    return `<div class="config-field editable" data-path="${escHtml(f.path)}" data-current="${f.on}" onclick="toggleConfig(this)">
      <div class="config-field-label">${t(f.labelKey)}</div>
      <div class="config-field-value ${cls}">${f.on ? t('on') : t('off')}</div>
    </div>`;
  }
  if (!f.path) {
    return `<div class="config-field">
      <div class="config-field-label">${t(f.labelKey)}</div>
      <div class="config-field-value">${escHtml(f.value) || '—'}</div>
    </div>`;
  }
  const optAttr = f.options ? ` data-options='${JSON.stringify(f.options)}'` : '';
  return `<div class="config-field editable" data-path="${escHtml(f.path)}" data-sensitive="${f.sensitive ? 'true' : 'false'}" data-current="${escHtml(f.value)}"${optAttr} onclick="startConfigEdit(this)">
    <div class="config-field-label">${t(f.labelKey)}</div>
    <div class="config-field-value">${escHtml(f.value) || '—'}${f.hint ? `<div class="config-field-hint">${t(f.hint)}</div>` : ''}</div>
  </div>`;
}

function renderConfigSection(cfg) {
  const open = cfg.open ? 'open' : '';
  return `<div class="config-section ${open}" id="cs-${cfg.id}">
    <div class="config-section-header" onclick="toggleSection('${cfg.id}')">
      <div class="config-section-title">${t(cfg.titleKey)}</div>
      ${cfg.statusBadge || ''}
      <span class="config-section-arrow">&#9658;</span>
    </div>
    <div class="config-section-body">
      ${cfg.fields.map(renderConfigField).join('')}
    </div>

async function toggleConfig(el) {
  if (el.classList.contains('editing')) return;
  const path = el.dataset.path;
  const currentOn = el.dataset.current === 'true';
  const newOn = !currentOn;
  el.style.opacity = '0.6';
  el.style.pointerEvents = 'none';
  try {
    const res = await fetch(`http://${location.hostname}:${API_PORT}/system/config`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json', ...authHeaders() },
      body: JSON.stringify({ path, value: String(newOn) }),
    });
    if (!res.ok) throw new Error(await res.text());
    el.dataset.current = String(newOn);
    const valueEl = el.querySelector('.value span, .config-field-value');
    if (valueEl) {
      valueEl.textContent = newOn ? t('on') : t('off');
      valueEl.className = (el.classList.contains('config-field') ? 'config-field-value' : 'value') + ` ${newOn ? 'on' : 'off'}`;
    }
    showBanner();
  } catch(err) {
    alert('Failed: ' + err.message);
  } finally {
    el.style.opacity = '';
    el.style.pointerEvents = '';
  }
}

function toggleCp(idx) {
  const card = document.getElementById('cp-' + idx);
  card.classList.toggle('open');

async function addCloudProvider() {
  const name  = document.getElementById('cp-new-name').value.trim();
  const model = document.getElementById('cp-new-model').value.trim();
  const base  = document.getElementById('cp-new-base').value.trim();
  if (!name || !model) { alert(t('label_new_name') + ' / ' + t('label_new_model') + ' required'); return; }
  try {
    const res = await fetch(`http://${location.hostname}:${API_PORT}/system/cloud_provider`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', ...authHeaders() },
      body: JSON.stringify({ name, model, api_base: base }),
    });
    if (!res.ok) throw new Error(await res.text());
    showBanner(); load();
  } catch(err) { alert('Failed: ' + err.message); }
}

async function selectChoice(btn) {
  const field = btn.closest('.config-field');
  const path = field.dataset.path;
  const value = btn.dataset.value;
  if (field.dataset.current === value) return;
  field.querySelectorAll('.choice-btn').forEach(b => b.disabled = true);
  try {
    const res = await fetch(`http://${location.hostname}:${API_PORT}/system/config`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json', ...authHeaders() },
      body: JSON.stringify({ path, value }),
    });
    if (!res.ok) throw new Error(await res.text());
    field.dataset.current = value;
    field.querySelectorAll('.choice-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.value === value);
      b.disabled = false;
    });
    showBanner();

function startConfigEdit(field) {
  if (field.classList.contains('editing')) return;
  field.classList.add('editing');
  const path = field.dataset.path;
  const sensitive = field.dataset.sensitive === 'true';
  const current = field.dataset.current;
  const options = field.dataset.options ? JSON.parse(field.dataset.options) : null;
  const valueDiv = field.querySelector('.config-field-value');

  let inputHtml;
  if (options) {
    inputHtml = `<select class="edit-input">${options.map(o => `<option value="${escHtml(o)}"${o===current?' selected':''}>${escHtml(o)}</option>`).join('')}</select>`;
  } else if (sensitive) {
    inputHtml = `<input class="edit-input" type="password" placeholder="${t('edit_placeholder_sensitive')}">`;
  } else {
    inputHtml = `<input class="edit-input" type="text" value="${escHtml(current)}">`;
  }

  valueDiv.innerHTML = inputHtml +
    `<div class="edit-actions">
      <button class="edit-btn confirm" onclick="confirmConfigEdit(event,this.closest('.config-field'))">${t('edit_confirm')}</button>
      <button class="edit-btn cancel" onclick="cancelConfigEdit(event,this.closest('.config-field'))">${t('edit_cancel')}</button>
    </div>`;

  const inp = valueDiv.querySelector('.edit-input');
  inp.focus();
  inp.addEventListener('keydown', e => {
    if (e.key === 'Enter') confirmConfigEdit(e, field);
    if (e.key === 'Escape') cancelConfigEdit(e, field);
  });
}

async function confirmConfigEdit(e, field) {
  e.stopPropagation();
  const path = field.dataset.path;
  const sensitive = field.dataset.sensitive === 'true';
  const inp = field.querySelector('.edit-input');
  const value = inp.value.trim();
  if (sensitive && !value) { cancelConfigEdit(e, field); return; }
  const btn = field.querySelector('.edit-btn.confirm');
  btn.disabled = true;
  try {
    const res = await fetch(`http://${location.hostname}:${API_PORT}/system/config`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json', ...authHeaders() },
      body: JSON.stringify({ path, value }),
    });
    if (!res.ok) throw new Error(await res.text());
    const display = sensitive ? _mask(value) : value;
    field.dataset.current = sensitive ? display : value;
    field.querySelector('.config-field-value').innerHTML = `${escHtml(display) || '—'}`;
    field.classList.remove('editing');
    showBanner();
  } catch(err) {
    alert('Failed: ' + err.message);
    btn.disabled = false;
  }
}

function cancelConfigEdit(e, field) {
  e.stopPropagation();
  const current = field.dataset.current;
  field.querySelector('.config-field-value').innerHTML = `${escHtml(current) || '—'}`;
  field.classList.remove('editing');
}

async function confirmEdit(e, card) {
  e.stopPropagation();
  const path = card.dataset.path;
  const sensitive = card.dataset.sensitive === 'true';
  const inp = card.querySelector('.edit-input');
  const value = inp.value.trim();
  if (sensitive && !value) { cancelEdit(e, card); return; }

  const btn = card.querySelector('.edit-btn.confirm');
  btn.disabled = true;
  try {
    const res = await fetch(`http://${location.hostname}:${API_PORT}/system/config`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json', ...authHeaders() },
      body: JSON.stringify({ path, value }),

    const display = sensitive ? _mask(value) : value;
    card.dataset.current = sensitive ? display : value;
    card.querySelector('.value').innerHTML = `<span>${escHtml(display) || '—'}</span>`;

function cancelEdit(e, card) {

  const current = card.dataset.current;
  const onClass = card.dataset.on === 'true' ? 'on' : card.dataset.on === 'false' ? 'off' : '';
  card.querySelector('.value').innerHTML = `<span class="${onClass}">${escHtml(current) || '—'}</span>`;
  card.classList.remove('editing');
}

function _mask(v) {
  if (!v) return '';
  if (v.length <= 8) return '••••';
  return v.slice(0,6) + '••••' + v.slice(-4);
}

function renderToolCard(tool) {
  const examples = tool.examples && tool.examples.length
    ? `<div class="card-examples">${tool.examples.map(e => `<span class="example-tag">${escHtml(e)}</span>`).join('')}</div>` : '';
  const params = Object.keys(tool.parameters || {}).length
    ? `<div class="card-meta">${t('label_params')}：<span>${Object.keys(tool.parameters).join(', ')}</span></div>` : '';
  const eid = encodeURIComponent(tool.name);
  const statusEl = tool.type === 'builtin'
    ? toggleBadge('tool', tool.name, tool.enabled)
    : statusBadge(tool.enabled);
  const warningEl = (tool.name === 'web_search' && tool.enabled && tool.search_supported === false)
    ? `<div style="margin-top:6px;padding:5px 8px;background:#2a2000;border:1px solid var(--yellow);border-radius:4px;color:var(--yellow);font-size:12px">⚠ ${t('web_search_unsupported')}</div>`
    : '';
  return `
    <div class="card ${tool.enabled ? '' : 'disabled'}" id="card-tool-${eid}">
      <div class="card-header">
        <div class="card-name">${escHtml(tool.name)}</div>
        ${badge(tool.type)}${statusEl}
        ${tool.type === 'builtin' ? `<button class="delete-btn" data-type="tool" data-name="${escHtml(tool.name)}" title="${t('delete_tip')}">✕</button>` : ''}
      </div>
      ${tool.description ? `<div class="card-desc">${escHtml(tool.description)}</div>` : ''}
      ${params}${examples}${warningEl}
    </div>`;
}

function renderAgentCard(a) {
  const examples = a.examples && a.examples.length
    ? `<div class="card-examples">${a.examples.map(e => `<span class="example-tag">${escHtml(e)}</span>`).join('')}</div>` : '';
  const eid = encodeURIComponent(a.name);
  return `
    <div class="card ${a.enabled ? '' : 'disabled'}" id="card-agent-${eid}">
      <div class="card-header">
        <div class="card-name">${escHtml(a.name)}</div>
        ${badge('agent')}
        <span class="badge" style="background:#1e2a1e;color:var(--green);font-size:10px">${escHtml(a.type)}</span>
        ${toggleBadge('agent', a.name, a.enabled)}
        <button class="delete-btn" data-type="agent" data-name="${escHtml(a.name)}" title="${t('delete_tip')}">✕</button>
      </div>
      ${a.description ? `<div class="card-desc">${escHtml(a.description)}</div>` : ''}
      ${examples}
    </div>`;
}

function renderSkillCard(s) {
  const trigger = s.trigger_type === 'keyword'
    ? `${t('label_keywords')}：${s.keywords.slice(0,4).map(k => `<span class="example-tag">${escHtml(k)}</span>`).join('')}`
    : `${t('label_schedule')}：<span class="example-tag">${escHtml(s.cron)}</span>`;
  const eid = encodeURIComponent(s.name);
  const isSkillHub = s.source && s.source.startsWith('skillhub:');
  const isFile = s.source && s.source !== 'bundled' && !isSkillHub;
  const sourceBadge = isSkillHub
    ? `<span class="badge badge-skillhub">${t('badge_skillhub')}</span>`
    : isFile ? `<span class="badge badge-file">${t('badge_file')}</span>` : '';
  const deletable = isFile || isSkillHub;
  return `
    <div class="card ${s.enabled ? '' : 'disabled'}" id="card-skill-${eid}">
      <div class="card-header">
        <div class="card-name">${escHtml(s.name)}</div>
        ${badge('skill')}${sourceBadge}${toggleBadge('skill', s.name, s.enabled)}
        ${deletable ? `<button class="delete-btn" data-type="skill-file" data-name="${escHtml(s.name)}" title="${t('delete_tip')}">✕</button>` : ''}
      </div>
      ${s.description ? `<div class="card-desc">${escHtml(s.description)}</div>` : ''}
      <div class="card-examples">${trigger}</div>
    </div>`;
}

function renderMCPCard(srv) {
  return `
    <div class="card">
      <div class="card-header">
        <div class="card-name">${escHtml(srv.name)}</div>
        ${badge('mcp')}
      </div>
      <div class="card-meta">${t('label_command')}：<span>${escHtml(srv.command)} ${escHtml((srv.args||[]).join(' '))}</span></div>
    </div>`;
}

function render(d) {
  if (d.pending_restart) showBanner(); else hideBanner();
  const tools = d.tools || [];
  const builtin = tools.filter(t => t.type === 'builtin');
  const mcpTools = tools.filter(t => t.type === 'mcp');
  const agents = d.agents || [];
  const skills = d.skills || [];
  const mcpServers = d.mcp_servers || [];

  document.getElementById('content').innerHTML = `
    <div class="section">
      <div class="section-title">${t('section_overview')}</div>
      ${renderSystem(d.system, d.cloud_providers || [])}
    </div>

    <div class="section">
      <div class="section-title">${t('section_tools')} (${builtin.filter(x=>x.enabled).length}/${builtin.length})</div>
      ${builtin.length ? `<div class="cards">${builtin.map(renderToolCard).join('')}</div>` : `<div class="empty">${t('empty_tools')}</div>`}
    </div>

    <div class="section">
      <div class="section-title">${t('section_agents')} (${agents.filter(a=>a.enabled).length}/${agents.length})</div>
      ${agents.length ? `<div class="cards">${agents.map(renderAgentCard).join('')}</div>` : `<div class="empty">${t('empty_agents')}</div>`}
    </div>

    <div class="section">
      <div class="section-title">
        ${t('section_skills')} (${skills.length})
        <button class="install-btn" onclick="openInstallSkill()" title="${t('install_skill_tip')}">+ ${t('install_skill')}</button>
      </div>
      ${skills.length ? `<div class="cards">${skills.map(renderSkillCard).join('')}</div>` : `<div class="empty">${t('empty_skills')}</div>`}
    </div>

    ${mcpServers.length || mcpTools.length ? `
    <div class="section">
      <div class="section-title">${t('section_mcp')}</div>
      ${mcpServers.length ? `<div class="cards">${mcpServers.map(renderMCPCard).join('')}</div>` : ''}
      ${mcpTools.length ? `<div class="cards" style="margin-top:12px">${mcpTools.map(renderToolCard).join('')}</div>` : ''}
    </div>` : ''}
  `;
}

async function load() {
  const contentEl = document.getElementById('content');
  contentEl.innerHTML = `<div class="loading" id="loading-text">${t('loading')}</div>`;
  try {
    const res = await fetch(`http://${location.hostname}:${API_PORT}/system`, { headers: authHeaders() });
    if (!res.ok) throw new Error(res.status);
    _data = await res.json();
    render(_data);
  } catch(e) {
    document.getElementById('content').innerHTML = `<div class="empty">${t('load_error')}${e.message}</div>`;
  }
}

function showBanner() {
  const b = document.getElementById('restart-banner');
  document.getElementById('banner-msg').textContent = t('banner_msg');
  document.getElementById('btn-restart').textContent = t('btn_restart');
  document.getElementById('btn-revert').textContent = t('btn_revert');
  b.style.display = 'flex';
}
function hideBanner() {
  document.getElementById('restart-banner').style.display = 'none';
}

async function doRestart() {
  const btn = document.getElementById('btn-restart');
  const revertBtn = document.getElementById('btn-revert');
  btn.disabled = revertBtn.disabled = true;
  btn.textContent = t('restarting');
  try {
    await fetch(`http://${location.hostname}:${API_PORT}/system/restart`, {
      method: 'POST', headers: authHeaders(),
    });
  } catch {}
  // Poll until API is back up, max 30 attempts (~30s)
  let attempts = 0;
  const poll = setInterval(async () => {
    attempts++;
    if (attempts > 30) {
      clearInterval(poll);
      btn.disabled = revertBtn.disabled = false;
      btn.textContent = t('btn_restart');
      alert(t('restart_timeout'));
      return;
    }
    try {
      const r = await fetch(`http://${location.hostname}:${API_PORT}/health`);
      if (r.ok) { clearInterval(poll); btn.disabled = revertBtn.disabled = false; btn.textContent = t('btn_restart'); hideBanner(); load(); }
    } catch {}
  }, 1000);
}

async function doRevert() {
  const btn = document.getElementById('btn-revert');
  const restartBtn = document.getElementById('btn-restart');
  btn.disabled = restartBtn.disabled = true;
  btn.textContent = t('reverting');
  try {
    await fetch(`http://${location.hostname}:${API_PORT}/system/revert`, {
      method: 'POST', headers: authHeaders(),
    });
    hideBanner();
    load();
  } catch(e) {
    alert('Failed: ' + e.message);
  } finally {
    btn.disabled = restartBtn.disabled = false;
    btn.textContent = t('btn_revert');
  }
}

// Delete event delegation
document.getElementById('content').addEventListener('click', async function(e) {
  const btn = e.target.closest('.delete-btn');
  if (!btn) return;
  e.stopPropagation();
  const type = btn.dataset.type;
  const name = btn.dataset.name;
  const msg = t('confirm_delete').replace('{name}', name);
  if (!confirm(msg)) return;
  btn.disabled = true;
  btn.style.opacity = '0.4';
  try {
    const endpoint = type === 'skill-file'
      ? `http://${location.hostname}:${API_PORT}/system/skill/${encodeURIComponent(name)}`
      : `http://${location.hostname}:${API_PORT}/system/${type}/${encodeURIComponent(name)}`;
    const res = await fetch(endpoint, { method: 'DELETE', headers: authHeaders() });
    if (!res.ok) throw new Error(await res.text());
    const json = await res.json();
    if (type === 'cloud_provider') {
      showBanner(); load();
    } else {
      const eid = encodeURIComponent(name);
      const cardType = type === 'skill-file' ? 'skill' : type;
      const card = document.getElementById(`card-${cardType}-${eid}`);
      if (card) card.remove();
      if (json.pending_restart) showBanner();
    }
  } catch(err) {
    alert('Failed: ' + err.message);
    btn.disabled = false;
    btn.style.opacity = '';
  }
});

// Toggle handler (called directly via onclick attribute)
async function handleToggle(badge) {
  const type = badge.dataset.type;
  const name = badge.dataset.name;
  const currentEnabled = badge.dataset.enabled === 'true';
  const newEnabled = !currentEnabled;
  badge.style.opacity = '0.5';
  badge.style.pointerEvents = 'none';
  try {
    const res = await fetch(`http://${location.hostname}:${API_PORT}/system/${type}/${encodeURIComponent(name)}`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json', ...authHeaders() },
      body: JSON.stringify({ enabled: newEnabled }),
    });
    if (!res.ok) throw new Error(await res.text());
    const json = await res.json();
    badge.dataset.enabled = String(newEnabled);
    badge.textContent = newEnabled ? t('on') : t('off');
    badge.className = `badge ${newEnabled ? 'badge-on' : 'badge-off'} toggle-badge`;
    const eid = encodeURIComponent(name);
    const card = document.getElementById(`card-${type}-${eid}`);
    if (card) card.classList.toggle('disabled', !newEnabled);
    if (json.pending_restart) showBanner();
  } catch(e) {
    alert('Failed: ' + e.message);
  } finally {
    badge.style.opacity = '';
    badge.style.pointerEvents = '';
  }
}

function updateThemeBtn() {
  const btn = document.getElementById('theme-toggle');
  if (btn) btn.innerHTML = document.body.classList.contains('light') ? _SVG_MOON : _SVG_SUN;
}
(function() {
  const saved = localStorage.getItem('theme') || 'dark';
  if (saved === 'light') {
    document.body.classList.add('light');
    document.documentElement.classList.add('light');
  }
  updateThemeBtn();
})();


function toggleTheme() {
  const isLight = document.body.classList.toggle('light');
  document.documentElement.classList.toggle('light', isLight);
  localStorage.setItem('theme', isLight ? 'light' : 'dark');
  updateThemeBtn();
}

document.querySelectorAll('.lang-btn').forEach(b =>

document.getElementById('nav-chat').textContent = t('nav_chat');

<!-- Install Skill Modal -->
<div class="install-modal" id="installSkillModal">
  <div class="install-box">
    <h4 id="installSkillTitle">Install Skill</h4>
    <div class="install-tabs">
      <div class="install-tab active" id="tabPaste" onclick="switchInstallTab('paste')" id="tabPaste"></div>
      <div class="install-tab" id="tabHub" onclick="switchInstallTab('hub')"></div>
    </div>
    <!-- Paste tab -->
    <div class="install-tab-pane active" id="paneInstallPaste">
      <p id="installSkillDesc"></p>
      <textarea id="installSkillYaml" spellcheck="false"></textarea>
      <div class="install-box-btns">
        <button id="installCancelBtn" onclick="closeInstallSkill()">Cancel</button>
        <button id="installConfirmBtn" class="primary" onclick="doInstallSkill()">Install</button>
      </div>
    </div>
    <!-- SkillHub tab -->
    <div class="install-tab-pane" id="paneInstallHub">
      <p id="hubDesc"></p>
      <div class="hub-search-row">
        <input type="text" id="hubSkillName" placeholder="explain-code" />
        <button id="hubFetchBtn" onclick="doFetchFromHub()"></button>
      </div>
      <div class="hub-status" id="hubStatus"></div>
      <div class="install-box-btns">
        <button id="hubCancelBtn" onclick="closeInstallSkill()">Cancel</button>
      </div>
    </div>
  </div>
</div>
<script>
let _installTab = 'paste';

function switchInstallTab(tab) {
  _installTab = tab;
  document.getElementById('tabPaste').classList.toggle('active', tab === 'paste');
  document.getElementById('tabHub').classList.toggle('active', tab === 'hub');
  document.getElementById('paneInstallPaste').classList.toggle('active', tab === 'paste');
  document.getElementById('paneInstallHub').classList.toggle('active', tab === 'hub');
}

function openInstallSkill() {
  document.getElementById('installSkillTitle').textContent = t('install_skill_title');
  document.getElementById('installSkillDesc').textContent = t('install_skill_desc');
  document.getElementById('installSkillYaml').placeholder = t('install_skill_placeholder');
  document.getElementById('tabPaste').textContent = t('tab_paste');
  document.getElementById('tabHub').textContent = t('tab_hub');
  document.getElementById('hubDesc').textContent = t('hub_desc');
  document.getElementById('hubFetchBtn').textContent = t('hub_search_btn');
  document.getElementById('installCancelBtn').textContent = t('btn_cancel');
  document.getElementById('installConfirmBtn').textContent = t('btn_install');
  document.getElementById('hubCancelBtn').textContent = t('btn_cancel');
  document.getElementById('installSkillYaml').value = '';
  document.getElementById('hubSkillName').value = '';
  document.getElementById('hubStatus').textContent = '';
  document.getElementById('hubStatus').className = 'hub-status';
  switchInstallTab('paste');
  document.getElementById('installSkillModal').classList.add('open');
  setTimeout(() => document.getElementById('installSkillYaml').focus(), 50);
}
function closeInstallSkill() {
  document.getElementById('installSkillModal').classList.remove('open');
}
async function doInstallSkill() {
  const content = document.getElementById('installSkillYaml').value.trim();
  if (!content) return;
  try {
    const res = await fetch(`http://${location.hostname}:${API_PORT}/system/skill/install`, {
      method: 'POST',
      headers: { ...authHeaders(), 'Content-Type': 'application/json' },
      body: JSON.stringify({ content }),
    });
    const data = await res.json();
    if (!res.ok) { alert('Failed: ' + (data.detail || res.status)); return; }
    closeInstallSkill();
    load();
  } catch(e) { alert('Error: ' + e.message); }
}
async function doFetchFromHub() {
  const name = document.getElementById('hubSkillName').value.trim();
  if (!name) return;
  // If user pasted SKILL.md content instead of a skill name, redirect to paste tab
  if (name.startsWith('---')) {
    document.getElementById('installSkillYaml').value = name;
    switchInstallTab('paste');
    return;
  }
  const statusEl = document.getElementById('hubStatus');
  statusEl.textContent = t('hub_searching');
  statusEl.className = 'hub-status';
  document.getElementById('hubFetchBtn').disabled = true;
  try {
    const res = await fetch(`http://${location.hostname}:${API_PORT}/system/skill/install-from-hub`, {
      method: 'POST',
      headers: { ...authHeaders(), 'Content-Type': 'application/json' },
      body: JSON.stringify({ name }),
    });
    const data = await res.json();
    if (!res.ok) {
      statusEl.textContent = data.detail || t('hub_not_found');
      statusEl.className = 'hub-status err';
    } else {
      statusEl.textContent = '✓ ' + data.name;
      statusEl.className = 'hub-status ok';
      setTimeout(() => { closeInstallSkill(); load(); }, 800);
    }
  } catch(e) {
    statusEl.textContent = e.message;
    statusEl.className = 'hub-status err';
  }
  document.getElementById('hubFetchBtn').disabled = false;
}
document.getElementById('hubSkillName').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') doFetchFromHub();
});
document.getElementById('installSkillModal').addEventListener('click', function(e) {
  if (e.target === this) closeInstallSkill();
});
</script>
